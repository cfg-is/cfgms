# Fleet test controller configuration
# Transport: gRPC-over-QUIC on 0.0.0.0:4433
# Storage: flatfile (no external database required)
# Token seeding: handled by CFGMS_SEED_TEST_TOKENS=1 env var, not in this file

cert_path: "/app/certs"

certificate:
  enable_cert_management: true
  auto_generate: true
  ca_path: "/app/certs/ca"
  renewal_threshold_days: 30
  server_cert_validity_days: 365
  client_cert_validity_days: 365
  server:
    common_name: "fleet-controller"
    dns_names:
      - "fleet-controller"
      - "localhost"
    ip_addresses:
      - "127.0.0.1"
    organization: "CFGMS Fleet Test"

transport:
  listen_addr: "0.0.0.0:4433"
  use_cert_manager: true

storage:
  flatfile_root: "/app/data/flatfile"
  sqlite_path: "/app/data/cfgms.db"

logging:
  level: "info"
  provider: "file"
  config:
    directory: "/tmp/cfgms"
    max_file_size: 10485760
    max_files: 3

# fleet-e2e stewards register from the docker-bridge subnet, which has no
# IPTrustStore entries on a fresh test boot. The default "ip-trust" approval
# workflow (Issue #1695) would quarantine them — they'd get certs but no
# steward_id finalization — and TestFleetWalkthrough times out grepping
# their logs for `"steward_id":"..."`. Use the deprecated auto-approve
# workflow here: appropriate for an isolated docker compose harness where
# every container is part of the test, never for production.
registration:
  workflow: auto-approve
