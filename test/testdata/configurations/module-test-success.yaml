# Test configuration for AC4 - successful module execution
# This configuration creates files and directories that the integration tests will verify
# Note: Permissions use octal notation (0644 = rw-r--r--, 0755 = rwxr-xr-x)
# Format: StewardConfig with flat resources array (will be transformed to executor format)

steward:
  id: ""  # Will be set by controller
  mode: "controller"

resources:
  - name: "test-file-1"
    module: "file"
    config:
      path: "/test-workspace/test-file.txt"
      content: "Hello from CFGMS file module!\n"
      permissions: 0644

  - name: "test-directory"
    module: "directory"
    config:
      path: "/test-workspace/test-dir"
      permissions: 0755
