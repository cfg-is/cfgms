# Controller Test Configuration (controller-test.cfg)
# This configuration uses YAML format with .cfg extension following CFGMS naming conventions.
# Production deployments use /etc/cfgms/controller.cfg
#
# Story #109: Re-enable GitHub Actions Workflows

# Certificate management with auto-generation
certificate:
  enable_cert_management: true
  auto_generate: true  # Controller generates CA and certs on first boot
  ca_path: "./test/integration/transport/certs/ca"
  cert_path: "./test/integration/transport/certs"
  renewal_threshold_days: 30
  server_cert_validity_days: 365
  client_cert_validity_days: 365
  enable_auto_renewal: false  # Manual control in tests

  # Server certificate configuration
  server:
    common_name: "controller-standalone"
    dns_names:
      - "controller-standalone"
      - "controller-east"
      - "controller-central"
      - "controller-west"
      - "localhost"
    ip_addresses:
      - "127.0.0.1"
      - "172.20.0.10"
    organization: "CFGMS Test"
    organizational_unit: "Test"
    country: "US"
    state: "Test"
    city: "TestCity"

# Unified gRPC-over-QUIC transport (Story #515)
# Uses ephemeral port to avoid conflicts with Docker services in CI
transport:
  listen_addr: "127.0.0.1:0"
  use_cert_manager: true

# Storage configuration
# Use git provider for certificate generation (no database required)
storage:
  provider: "git"
  config:
    repository_path: "./test/integration/data/git-storage"
    branch: "main"
    auto_init: true

# Logging configuration
# Production pattern: declarative logging configuration
logging:
  level: "info"
  provider: "file"
  config:
    directory: "./test/integration/logs"  # Writable in CI environments
    max_file_size: 10485760  # 10MB
    max_files: 3
    compress_rotated: false
