# Docker Compose configuration for CFGMS High Availability testing
# Provides multi-controller cluster testing with geographic distribution simulation
#
# AGGRESSIVE TIMING CONFIGURATION for Local Docker Testing:
# - Election Timeout: 3s (vs 10s production)
# - Heartbeat Interval: 500ms (vs 2s production)
# - Health Check Interval: 250ms (vs 1s production)
# - Leader Lease Duration: 2s (vs 15s production)
# - Expected failover time: < 10 seconds (vs < 30s production)

version: '3.8'

services:
  # Shared database for HA cluster storage
  postgres-ha:
    image: postgres:15-alpine
    container_name: cfgms-postgres-ha-test
    environment:
      - POSTGRES_DB=cfgms_ha_test
      - POSTGRES_USER=cfgms_ha_test
      - POSTGRES_PASSWORD=cfgms_ha_test_password
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5433:5432"
    volumes:
      - postgres_ha_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfgms_ha_test -d cfgms_ha_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      ha-cluster:
        ipv4_address: 172.21.1.10

  # Controller East (US East region simulation)
  controller-east:
    build:
      context: .
      dockerfile: Dockerfile.controller
    container_name: cfgms-controller-east
    environment:
      # HA Configuration
      - CFGMS_HA_MODE=cluster
      - CFGMS_HA_NODE_ID=controller-east-1
      - CFGMS_HA_NODE_NAME=cfgms-east-primary
      - CFGMS_HA_REGION=us-east
      - CFGMS_HA_AVAILABILITY_ZONE=us-east-1a
      - CFGMS_HA_EXTERNAL_ADDRESS=172.21.1.20:8080
      - CFGMS_HA_INTERNAL_ADDRESS=172.21.1.20:8081
      - CFGMS_HA_CLUSTER_SIZE=3
      - CFGMS_HA_MIN_QUORUM=2
      - CFGMS_HA_DISCOVERY_METHOD=geographic
      # HTTP API Configuration
      - CFGMS_LISTEN_ADDR=0.0.0.0:8080
      - CFGMS_HA_ELECTION_TIMEOUT=3s
      - CFGMS_HA_HEARTBEAT_INTERVAL=500ms

      # Storage Configuration (database storage required for HA clusters)
      - CFGMS_STORAGE_PROVIDER=database
      - CFGMS_STORAGE_DATABASE_HOST=postgres-ha
      - CFGMS_STORAGE_DATABASE_PORT=5432
      - CFGMS_STORAGE_DATABASE_NAME=cfgms_ha_test
      - CFGMS_STORAGE_DATABASE_USER=cfgms_ha_test
      - CFGMS_STORAGE_DATABASE_PASSWORD=cfgms_ha_test_password
      - CFGMS_STORAGE_DATABASE_SSLMODE=disable

      # Server Configuration
      - CFGMS_CONTROLLER_BIND_ADDRESS=0.0.0.0:8080
      - CFGMS_CONTROLLER_METRICS_BIND_ADDRESS=0.0.0.0:9090
      - CFGMS_HTTP_LISTEN_ADDR=0.0.0.0:9080
      - CFGMS_LOG_LEVEL=debug
      - CFGMS_LOG_PROVIDER=file
      - CFGMS_LOG_DIR=/app/logs

      # mTLS Certificate Configuration
      - CFGMS_CERT_ENABLE_MANAGEMENT=true
      - CFGMS_CERT_CA_PATH=/app/certs
      - CFGMS_CERT_AUTO_GENERATE=true
      - CFGMS_CERT_SERVER_COMMON_NAME=controller-east
      - CFGMS_CERT_SERVER_VALIDITY_DAYS=90

      # Test Environment - Aggressive Timing for Local Docker
      - CFGMS_TEST_MODE=true
      - CFGMS_HA_HEALTH_CHECK_INTERVAL=250ms
      - CFGMS_HA_LEADER_LEASE_DURATION=2s
      - CFGMS_HA_CANDIDATE_TIMEOUT=1s
      - CFGMS_HA_APPLY_TIMEOUT=500ms
    ports:
      - "8080:8080"   # Controller API
      - "9080:9080"   # HTTP API
      - "9090:9090"   # Metrics
    depends_on:
      postgres-ha:
        condition: service_healthy
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
    #   interval: 2s
    #   timeout: 1s
    #   retries: 15
    #   start_period: 10s
    networks:
      ha-cluster:
        ipv4_address: 172.21.1.20

  # Controller Central (US Central region simulation)
  controller-central:
    build:
      context: .
      dockerfile: Dockerfile.controller
    container_name: cfgms-controller-central
    environment:
      # HA Configuration
      - CFGMS_HA_MODE=cluster
      - CFGMS_HA_NODE_ID=controller-central-1
      - CFGMS_HA_NODE_NAME=cfgms-central-primary
      - CFGMS_HA_REGION=us-central
      - CFGMS_HA_AVAILABILITY_ZONE=us-central-1a
      - CFGMS_HA_EXTERNAL_ADDRESS=172.21.1.21:8080
      - CFGMS_HA_INTERNAL_ADDRESS=172.21.1.21:8081
      - CFGMS_HA_CLUSTER_SIZE=3
      - CFGMS_HA_MIN_QUORUM=2
      - CFGMS_HA_DISCOVERY_METHOD=geographic
      # HTTP API Configuration
      - CFGMS_LISTEN_ADDR=0.0.0.0:8080
      - CFGMS_HA_ELECTION_TIMEOUT=3s
      - CFGMS_HA_HEARTBEAT_INTERVAL=500ms

      # Storage Configuration (database storage required for HA clusters)
      - CFGMS_STORAGE_PROVIDER=database
      - CFGMS_STORAGE_DATABASE_HOST=postgres-ha
      - CFGMS_STORAGE_DATABASE_PORT=5432
      - CFGMS_STORAGE_DATABASE_NAME=cfgms_ha_test
      - CFGMS_STORAGE_DATABASE_USER=cfgms_ha_test
      - CFGMS_STORAGE_DATABASE_PASSWORD=cfgms_ha_test_password
      - CFGMS_STORAGE_DATABASE_SSLMODE=disable

      # Server Configuration
      - CFGMS_CONTROLLER_BIND_ADDRESS=0.0.0.0:8080
      - CFGMS_CONTROLLER_METRICS_BIND_ADDRESS=0.0.0.0:9090
      - CFGMS_HTTP_LISTEN_ADDR=0.0.0.0:9080
      - CFGMS_LOG_LEVEL=debug
      - CFGMS_LOG_PROVIDER=file
      - CFGMS_LOG_DIR=/app/logs

      # mTLS Certificate Configuration
      - CFGMS_CERT_ENABLE_MANAGEMENT=true
      - CFGMS_CERT_CA_PATH=/app/certs
      - CFGMS_CERT_AUTO_GENERATE=true
      - CFGMS_CERT_SERVER_COMMON_NAME=controller-central
      - CFGMS_CERT_SERVER_VALIDITY_DAYS=90

      # Test Environment - Aggressive Timing for Local Docker
      - CFGMS_TEST_MODE=true
      - CFGMS_HA_HEALTH_CHECK_INTERVAL=250ms
      - CFGMS_HA_LEADER_LEASE_DURATION=2s
      - CFGMS_HA_CANDIDATE_TIMEOUT=1s
      - CFGMS_HA_APPLY_TIMEOUT=500ms
    ports:
      - "8081:8080"   # Controller API
      - "9081:9080"   # HTTP API
      - "9091:9090"   # Metrics
    depends_on:
      postgres-ha:
        condition: service_healthy
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
    #   interval: 2s
    #   timeout: 1s
    #   retries: 15
    #   start_period: 10s
    networks:
      ha-cluster:
        ipv4_address: 172.21.1.21

  # Controller West (US West region simulation)
  controller-west:
    build:
      context: .
      dockerfile: Dockerfile.controller
    container_name: cfgms-controller-west
    environment:
      # HA Configuration
      - CFGMS_HA_MODE=cluster
      - CFGMS_HA_NODE_ID=controller-west-1
      - CFGMS_HA_NODE_NAME=cfgms-west-primary
      - CFGMS_HA_REGION=us-west
      - CFGMS_HA_AVAILABILITY_ZONE=us-west-1a
      - CFGMS_HA_EXTERNAL_ADDRESS=172.21.1.22:8080
      - CFGMS_HA_INTERNAL_ADDRESS=172.21.1.22:8081
      - CFGMS_HA_CLUSTER_SIZE=3
      - CFGMS_HA_MIN_QUORUM=2
      - CFGMS_HA_DISCOVERY_METHOD=geographic
      # HTTP API Configuration
      - CFGMS_LISTEN_ADDR=0.0.0.0:8080
      - CFGMS_HA_ELECTION_TIMEOUT=3s
      - CFGMS_HA_HEARTBEAT_INTERVAL=500ms

      # Storage Configuration (database storage required for HA clusters)
      - CFGMS_STORAGE_PROVIDER=database
      - CFGMS_STORAGE_DATABASE_HOST=postgres-ha
      - CFGMS_STORAGE_DATABASE_PORT=5432
      - CFGMS_STORAGE_DATABASE_NAME=cfgms_ha_test
      - CFGMS_STORAGE_DATABASE_USER=cfgms_ha_test
      - CFGMS_STORAGE_DATABASE_PASSWORD=cfgms_ha_test_password
      - CFGMS_STORAGE_DATABASE_SSLMODE=disable

      # Server Configuration
      - CFGMS_CONTROLLER_BIND_ADDRESS=0.0.0.0:8080
      - CFGMS_CONTROLLER_METRICS_BIND_ADDRESS=0.0.0.0:9090
      - CFGMS_HTTP_LISTEN_ADDR=0.0.0.0:9080
      - CFGMS_LOG_LEVEL=debug
      - CFGMS_LOG_PROVIDER=file
      - CFGMS_LOG_DIR=/app/logs

      # mTLS Certificate Configuration
      - CFGMS_CERT_ENABLE_MANAGEMENT=true
      - CFGMS_CERT_CA_PATH=/app/certs
      - CFGMS_CERT_AUTO_GENERATE=true
      - CFGMS_CERT_SERVER_COMMON_NAME=controller-west
      - CFGMS_CERT_SERVER_VALIDITY_DAYS=90

      # Test Environment - Aggressive Timing for Local Docker
      - CFGMS_TEST_MODE=true
      - CFGMS_HA_HEALTH_CHECK_INTERVAL=250ms
      - CFGMS_HA_LEADER_LEASE_DURATION=2s
      - CFGMS_HA_CANDIDATE_TIMEOUT=1s
      - CFGMS_HA_APPLY_TIMEOUT=500ms
    ports:
      - "8082:8080"   # Controller API
      - "9082:9080"   # HTTP API
      - "9092:9090"   # Metrics
    depends_on:
      postgres-ha:
        condition: service_healthy
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
    #   interval: 2s
    #   timeout: 1s
    #   retries: 15
    #   start_period: 10s
    networks:
      ha-cluster:
        ipv4_address: 172.21.1.22

  # Steward East (connected to HA controller cluster)
  steward-east:
    build:
      context: .
      dockerfile: Dockerfile.steward
    container_name: cfgms-steward-east
    environment:
      # Controller cluster configuration (HA-aware)
      - CFGMS_CONTROLLER_URLS=controller-east:8080,controller-central:8080,controller-west:8080
      - CFGMS_CONTROLLER_GRPC_URLS=controller-east:8081,controller-central:8081,controller-west:8081

      # Steward identification
      - CFGMS_STEWARD_ID=steward-east-1
      - CFGMS_STEWARD_NAME=steward-us-east
      - CFGMS_STEWARD_REGION=us-east
      - CFGMS_STEWARD_AVAILABILITY_ZONE=us-east-1a

      # HA Configuration
      - CFGMS_HA_AWARE=true
      - CFGMS_HA_FAILOVER_ENABLED=true
      - CFGMS_HA_CONNECTION_RETRY_INTERVAL=2s
      - CFGMS_HA_CONNECTION_TIMEOUT=10s
      - CFGMS_HA_HEALTH_CHECK_INTERVAL=5s

      # Testing configuration
      - CFGMS_TEST_MODE=true
      - CFGMS_LOG_LEVEL=debug
      - CFGMS_LOG_PROVIDER=file
      - CFGMS_LOG_DIR=/app/logs

      # mTLS Client Certificate Configuration
      - CFGMS_STEWARD_CERT_PATH=/app/certs
      - CFGMS_STEWARD_TLS_ENABLED=true
      - CFGMS_STEWARD_CA_CERT_PATH=/app/certs/ca.pem
      - CFGMS_STEWARD_CLIENT_CERT_PATH=/app/certs/steward-east.pem
      - CFGMS_STEWARD_CLIENT_KEY_PATH=/app/certs/steward-east-key.pem
    volumes:
      - steward_east_data:/app/data
      - steward_east_logs:/app/logs
      - steward_east_certs:/app/certs
    depends_on:
      controller-east:
        condition: service_started
      controller-central:
        condition: service_started
      controller-west:
        condition: service_started
    healthcheck:
      test: ["CMD", "pgrep", "steward"]
      interval: 2s
      timeout: 1s
      retries: 15
      start_period: 15s
    networks:
      ha-cluster:
        ipv4_address: 172.21.1.30

  # Steward Central (connected to HA controller cluster)
  steward-central:
    build:
      context: .
      dockerfile: Dockerfile.steward
    container_name: cfgms-steward-central
    environment:
      # Controller cluster configuration (HA-aware)
      - CFGMS_CONTROLLER_URLS=controller-east:8080,controller-central:8080,controller-west:8080
      - CFGMS_CONTROLLER_GRPC_URLS=controller-east:8081,controller-central:8081,controller-west:8081

      # Steward identification
      - CFGMS_STEWARD_ID=steward-central-1
      - CFGMS_STEWARD_NAME=steward-us-central
      - CFGMS_STEWARD_REGION=us-central
      - CFGMS_STEWARD_AVAILABILITY_ZONE=us-central-1a

      # HA Configuration
      - CFGMS_HA_AWARE=true
      - CFGMS_HA_FAILOVER_ENABLED=true
      - CFGMS_HA_CONNECTION_RETRY_INTERVAL=2s
      - CFGMS_HA_CONNECTION_TIMEOUT=10s
      - CFGMS_HA_HEALTH_CHECK_INTERVAL=5s

      # Testing configuration
      - CFGMS_TEST_MODE=true
      - CFGMS_LOG_LEVEL=debug
      - CFGMS_LOG_PROVIDER=file
      - CFGMS_LOG_DIR=/app/logs

      # mTLS Client Certificate Configuration
      - CFGMS_STEWARD_CERT_PATH=/app/certs
      - CFGMS_STEWARD_TLS_ENABLED=true
      - CFGMS_STEWARD_CA_CERT_PATH=/app/certs/ca.pem
      - CFGMS_STEWARD_CLIENT_CERT_PATH=/app/certs/steward-central.pem
      - CFGMS_STEWARD_CLIENT_KEY_PATH=/app/certs/steward-central-key.pem
    volumes:
      - steward_central_data:/app/data
      - steward_central_logs:/app/logs
      - steward_central_certs:/app/certs
    depends_on:
      controller-east:
        condition: service_started
      controller-central:
        condition: service_started
      controller-west:
        condition: service_started
    healthcheck:
      test: ["CMD", "pgrep", "steward"]
      interval: 2s
      timeout: 1s
      retries: 15
      start_period: 15s
    networks:
      ha-cluster:
        ipv4_address: 172.21.1.31

  # Steward West (connected to HA controller cluster)
  steward-west:
    build:
      context: .
      dockerfile: Dockerfile.steward
    container_name: cfgms-steward-west
    environment:
      # Controller cluster configuration (HA-aware)
      - CFGMS_CONTROLLER_URLS=controller-east:8080,controller-central:8080,controller-west:8080
      - CFGMS_CONTROLLER_GRPC_URLS=controller-east:8081,controller-central:8081,controller-west:8081

      # Steward identification
      - CFGMS_STEWARD_ID=steward-west-1
      - CFGMS_STEWARD_NAME=steward-us-west
      - CFGMS_STEWARD_REGION=us-west
      - CFGMS_STEWARD_AVAILABILITY_ZONE=us-west-1a

      # HA Configuration
      - CFGMS_HA_AWARE=true
      - CFGMS_HA_FAILOVER_ENABLED=true
      - CFGMS_HA_CONNECTION_RETRY_INTERVAL=2s
      - CFGMS_HA_CONNECTION_TIMEOUT=10s
      - CFGMS_HA_HEALTH_CHECK_INTERVAL=5s

      # Testing configuration
      - CFGMS_TEST_MODE=true
      - CFGMS_LOG_LEVEL=debug
      - CFGMS_LOG_PROVIDER=file
      - CFGMS_LOG_DIR=/app/logs

      # mTLS Client Certificate Configuration
      - CFGMS_STEWARD_CERT_PATH=/app/certs
      - CFGMS_STEWARD_TLS_ENABLED=true
      - CFGMS_STEWARD_CA_CERT_PATH=/app/certs/ca.pem
      - CFGMS_STEWARD_CLIENT_CERT_PATH=/app/certs/steward-west.pem
      - CFGMS_STEWARD_CLIENT_KEY_PATH=/app/certs/steward-west-key.pem
    volumes:
      - steward_west_data:/app/data
      - steward_west_logs:/app/logs
      - steward_west_certs:/app/certs
    depends_on:
      controller-east:
        condition: service_started
      controller-central:
        condition: service_started
      controller-west:
        condition: service_started
    healthcheck:
      test: ["CMD", "pgrep", "steward"]
      interval: 2s
      timeout: 1s
      retries: 15
      start_period: 15s
    networks:
      ha-cluster:
        ipv4_address: 172.21.1.32

  # Network chaos simulation tool (for partition testing)
  chaos-network:
    image: alpine:latest
    container_name: cfgms-chaos-network
    command: >
      sh -c "
        apk add --no-cache iptables tcpdump iproute2 curl &&
        echo 'Network chaos tools ready' &&
        tail -f /dev/null
      "
    cap_add:
      - NET_ADMIN
    networks:
      ha-cluster:
        ipv4_address: 172.21.1.100
    profiles:
      - chaos

  # Test orchestrator (runs integration tests)
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: cfgms-ha-test-runner
    environment:
      - CFGMS_HA_TEST_MODE=integration
      - CONTROLLER_EAST_URL=http://controller-east:8080
      - CONTROLLER_CENTRAL_URL=http://controller-central:8080
      - CONTROLLER_WEST_URL=http://controller-west:8080
      - GIT_SERVER_URL=http://git-server-ha:3000
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    depends_on:
      controller-east:
        condition: service_started
      controller-central:
        condition: service_started
      controller-west:
        condition: service_started
    networks:
      ha-cluster:
        ipv4_address: 172.21.1.200
    profiles:
      - testing

volumes:
  postgres_ha_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=256m

  steward_east_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=64m

  steward_east_logs:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=32m

  steward_central_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=64m

  steward_central_logs:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=32m

  steward_west_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=64m

  steward_west_logs:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=32m

  steward_east_certs:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=16m

  steward_central_certs:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=16m

  steward_west_certs:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=16m

networks:
  ha-cluster:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.21.1.0/24
          gateway: 172.21.1.1