# M365 Tenant Configuration for Acme Corp Client
#
# This configuration file demonstrates how to manage Microsoft 365 resources
# using the same .cfg format as physical endpoint management. The "Virtual Steward"
# approach allows administrators to manage SaaS platforms identically to endpoints.
#
# Resource ID Format: tenantID:resourceIdentifier
# Tenant ID: contoso.onmicrosoft.com (example tenant)

# Configuration metadata
steward:
  id: "m365-acme-corp"
  tenant_id: "12345678-1234-1234-1234-123456789012"
  authentication:
    type: "oauth2_client_credentials"
    client_id: "${M365_CLIENT_ID}"
    client_secret: "${M365_CLIENT_SECRET}"
    scopes:
      - "https://graph.microsoft.com/.default"

# Entra ID User Management
resources:
  # Create a new user
  - id: "12345678-1234-1234-1234-123456789012:john.doe@acmecorp.com"
    type: "entra_user"
    config:
      user_principal_name: "john.doe@acmecorp.com"
      display_name: "John Doe"
      mail_nickname: "john.doe"
      account_enabled: true
      job_title: "Sales Manager"
      department: "Sales"
      office_location: "New York Office"
      mobile_phone: "+1-555-0123"
      
      # Password configuration (for new users)
      password_profile:
        password: "${INITIAL_PASSWORD}"
        force_change_password_next_signin: true
      
      # License assignments
      licenses:
        - sku_id: "c7df2760-2c81-4ef7-b578-5b5392b571df"  # Office 365 E5
          disabled_plans: []
        - sku_id: "b05e124f-c7cc-45a0-a6aa-8cf78c946968"  # Enterprise Mobility + Security E5
          disabled_plans:
            - "8a256a2b-b617-496d-b51b-e76466e88db0"  # Microsoft Threat Intelligence
      
      # Group memberships
      groups:
        - "Sales Team"
        - "New York Office"
        - "M365 E5 Users"
      
      # Specify which fields to manage (optional - defaults to all configured)
      managed_fields:
        - "display_name"
        - "job_title"
        - "department"
        - "office_location"
        - "mobile_phone"
        - "account_enabled"
        - "licenses"
        - "groups"
      
      tenant_id: "12345678-1234-1234-1234-123456789012"

  # Update an existing user
  - id: "12345678-1234-1234-1234-123456789012:jane.smith@acmecorp.com"
    type: "entra_user"
    config:
      user_principal_name: "jane.smith@acmecorp.com"
      display_name: "Jane Smith"
      mail_nickname: "jane.smith"
      account_enabled: true
      job_title: "Marketing Director"
      department: "Marketing"
      office_location: "Chicago Office"
      
      # Only manage specific fields for existing users
      managed_fields:
        - "job_title"
        - "office_location"
      
      tenant_id: "12345678-1234-1234-1234-123456789012"

  # Conditional Access Policy - Require MFA for all users
  - id: "12345678-1234-1234-1234-123456789012:mfa-all-users-policy"
    type: "conditional_access"
    config:
      display_name: "Require MFA for All Users"
      state: "enabled"
      
      conditions:
        users:
          include_users:
            - "All"
          exclude_users:
            - "break-glass-admin@acmecorp.com"  # Emergency access account
        
        applications:
          include_applications:
            - "All"
          exclude_applications: []
        
        locations:
          include_locations:
            - "All"
          exclude_locations:
            - "Trusted-Office-Networks"  # Named location for office networks
        
        client_app_types:
          - "browser"
          - "mobileAppsAndDesktopClients"
        
        sign_in_risk_levels: []
        user_risk_levels: []
      
      grant_controls:
        operator: "OR"
        built_in_controls:
          - "mfa"  # Require multi-factor authentication
        custom_authentication_factors: []
        terms_of_use: []
      
      session_controls:
        sign_in_frequency:
          is_enabled: true
          type: "hours"
          value: 8
          frequency_interval: "timeBased"
      
      tenant_id: "12345678-1234-1234-1234-123456789012"

  # Conditional Access Policy - Block access from high-risk countries
  - id: "12345678-1234-1234-1234-123456789012:block-high-risk-countries"
    type: "conditional_access"
    config:
      display_name: "Block Access from High-Risk Countries"
      state: "enabled"
      
      conditions:
        users:
          include_users:
            - "All"
          exclude_users:
            - "break-glass-admin@acmecorp.com"
        
        applications:
          include_applications:
            - "All"
        
        locations:
          include_locations:
            - "High-Risk-Countries"  # Named location group
      
      grant_controls:
        operator: "OR"
        built_in_controls:
          - "block"  # Block access
      
      tenant_id: "12345678-1234-1234-1234-123456789012"

  # Intune Device Configuration - Windows 10 Security Baseline
  - id: "12345678-1234-1234-1234-123456789012:windows10-security-baseline"
    type: "intune_policy"
    config:
      display_name: "Windows 10 Security Baseline - Acme Corp"
      description: "Corporate security baseline for Windows 10 devices"
      device_configuration_type: "microsoft.graph.windows10GeneralConfiguration"
      
      settings:
        # Password policies
        passwordRequired: true
        passwordMinimumLength: 12
        passwordRequiredType: "alphanumeric"
        passwordPreviousPasswordBlockCount: 12
        passwordMinimumCharacterSetCount: 3
        passwordExpirationDays: 90
        passwordMinutesOfInactivityBeforeScreenTimeout: 15
        passwordSignInFailureCountBeforeFactoryReset: 10
        
        # Windows Defender settings
        defenderRequireRealTimeMonitoring: true
        defenderRequireBehaviorMonitoring: true
        defenderRequireNetworkInspectionSystem: true
        defenderScanDownloads: true
        defenderScheduleScanDay: "everyday"
        defenderScanType: "quick"
        defenderSystemScanSchedule: "userDefined"
        
        # Smart Screen settings
        smartScreenEnabled: true
        smartScreenBlockPromptOverride: true
        smartScreenBlockPromptOverrideForFiles: true
        
        # Storage and encryption
        storageBlockRemovableStorage: false
        storageRequireMobileDeviceEncryption: true
        
        # Windows Update settings
        automaticUpdateMode: "autoInstallAtMaintenanceTime"
        automaticUpdateInstallTime: "03:00"
        
        # Application settings
        microsoftAccountBlocked: false
        microsoftAccountBlockSettingsSync: false
        
        # Privacy settings
        privacyBlockInputPersonalization: false
        privacyBlockActivityFeed: false
        
        # Start menu settings
        startMenuHideChangeAccountSettings: false
        startMenuHideFrequentlyUsedApps: false
        
        # Network settings
        networkProxyDisableAutoDetect: false
        networkProxyAutomaticConfigurationUrl: ""
        
        # Security settings
        securityBlockAzureADJoinedDevicesAutoEncryption: false
        securityRequireVerifyApps: true
      
      # Assign to device groups
      assignments:
        - target:
            target_type: "groupAssignmentTarget"
            include_groups:
              - "Corporate Windows 10 Devices"
          intent: "apply"
        
        - target:
            target_type: "exclusionGroupAssignmentTarget"
            exclude_groups:
              - "Test Devices"
          intent: "remove"
      
      tenant_id: "12345678-1234-1234-1234-123456789012"

  # Intune Device Configuration - macOS Security Settings
  - id: "12345678-1234-1234-1234-123456789012:macos-security-baseline"
    type: "intune_policy"
    config:
      display_name: "macOS Security Baseline - Acme Corp"
      description: "Corporate security baseline for macOS devices"
      device_configuration_type: "microsoft.graph.macOSGeneralDeviceConfiguration"
      
      settings:
        # Password policies
        passwordRequired: true
        passwordMinimumLength: 12
        passwordRequiredType: "alphanumeric"
        passwordPreviousPasswordBlockCount: 12
        passwordMinimumCharacterSetCount: 3
        passwordExpirationDays: 90
        passwordMinutesOfInactivityBeforeScreenTimeout: 15
        passwordSignInFailureCountBeforeWipe: 10
        
        # System security
        systemIntegrityProtectionEnabled: true
        firewallEnabled: true
        firewallBlockAllIncoming: false
        firewallEnableStealthMode: true
        gatekeeperAllowedAppSource: "macAppStoreAndIdentifiedDevelopers"
        
        # Application restrictions
        appStoreBlockAutomaticDownloads: false
        appStoreBlocked: false
        appStoreRequirePassword: "always"
        
        # System settings
        bluetoothBlockModification: false
        cameraBlocked: false
        screenCaptureBlocked: false
        
        # Content filtering
        contentCachingBlocked: false
        definitionLookupBlocked: false
        
        # iCloud settings
        iCloudBlockDocumentSync: false
        iCloudBlockMail: false
        iCloudBlockAddressBook: false
        iCloudBlockCalendar: false
        iCloudBlockReminders: false
        iCloudBlockBookmarks: false
        iCloudBlockNotes: false
        iCloudBlockBackup: false
        iCloudBlockPhotoLibrary: false
        iCloudBlockPhotoStreamSync: false
        iCloudBlockSharedPhotoStream: false
        iCloudRequireEncryptedBackup: true
      
      # Assign to device groups
      assignments:
        - target:
            target_type: "groupAssignmentTarget"
            include_groups:
              - "Corporate macOS Devices"
          intent: "apply"
      
      tenant_id: "12345678-1234-1234-1234-123456789012"