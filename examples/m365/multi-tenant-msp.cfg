# Multi-Tenant MSP Configuration
#
# This example demonstrates how an MSP can manage multiple M365 tenants
# using cascading configuration inheritance. The MSP defines baseline
# policies that automatically cascade to all client tenants.
#
# Hierarchy: MSP (Level 0) → Client (Level 1) → Site (Level 2) → Device (Level 3)
#
# Each tenant has its own configuration that inherits from the MSP baseline
# but can override specific settings for client-specific requirements.

# MSP-level configuration (baseline for all clients)
steward:
  id: "msp-acme-it-services"
  type: "msp_controller"
  authentication:
    type: "oauth2_client_credentials"
    # MSP uses delegated admin privileges across client tenants
    authority_url: "https://login.microsoftonline.com/common"
  
  # Cascade settings to all child tenants
  cascade_policy: "merge_with_override"
  
  # Default policies applied to all client tenants
  baseline_policies:
    security_baseline: true
    compliance_monitoring: true
    backup_policies: true

# Client Tenant 1: Acme Manufacturing
resources:
  # Baseline Conditional Access Policy (applied to all client tenants)
  - id: "*:baseline-mfa-policy"  # * means apply to all tenants
    type: "conditional_access"
    config:
      display_name: "MSP Baseline - Require MFA"
      state: "enabled"
      
      conditions:
        users:
          include_users:
            - "All"
          exclude_users:
            - "break-glass-*"  # Pattern matching for emergency accounts
        
        applications:
          include_applications:
            - "All"
        
        client_app_types:
          - "browser"
          - "mobileAppsAndDesktopClients"
      
      grant_controls:
        operator: "OR"
        built_in_controls:
          - "mfa"
      
      # This policy cascades to all client tenants unless overridden
      cascade: true

  # Client-specific tenant: Acme Manufacturing
  - tenant_id: "acme-manufacturing-tenant-id"
    client_name: "Acme Manufacturing"
    resources:
      # Client-specific admin user
      - id: "acme-manufacturing-tenant-id:admin@acmemanufacturing.com"
        type: "entra_user"
        config:
          user_principal_name: "admin@acmemanufacturing.com"
          display_name: "Manufacturing IT Admin"
          mail_nickname: "admin"
          account_enabled: true
          job_title: "IT Administrator"
          department: "IT"
          
          # Manufacturing-specific licenses
          licenses:
            - sku_id: "c7df2760-2c81-4ef7-b578-5b5392b571df"  # Office 365 E5
            - sku_id: "efccb6f7-5641-4e0e-bd10-b4976e1bf68e"  # Enterprise Mobility + Security E3
          
          groups:
            - "Manufacturing Admins"
            - "MSP Managed Users"
      
      # Manufacturing-specific Conditional Access Policy
      - id: "acme-manufacturing-tenant-id:manufacturing-device-compliance"
        type: "conditional_access"
        config:
          display_name: "Manufacturing - Compliant Device Required"
          state: "enabled"
          
          conditions:
            users:
              include_groups:
                - "Manufacturing Floor Workers"
            
            applications:
              include_applications:
                - "All"
            
            locations:
              include_locations:
                - "Manufacturing Floor Networks"
          
          grant_controls:
            operator: "AND"
            built_in_controls:
              - "compliantDevice"
              - "mfa"
          
          tenant_id: "acme-manufacturing-tenant-id"
      
      # Manufacturing device security policy
      - id: "acme-manufacturing-tenant-id:manufacturing-device-policy"
        type: "intune_policy"
        config:
          display_name: "Manufacturing Device Security Policy"
          description: "Security settings for manufacturing floor devices"
          device_configuration_type: "microsoft.graph.windows10GeneralConfiguration"
          
          settings:
            # Strict password requirements for manufacturing environment
            passwordRequired: true
            passwordMinimumLength: 14
            passwordRequiredType: "alphanumeric"
            passwordMinutesOfInactivityBeforeScreenTimeout: 10
            
            # Enhanced security for manufacturing data
            storageRequireMobileDeviceEncryption: true
            defenderRequireRealTimeMonitoring: true
            
            # Restrict USB access for data protection
            storageBlockRemovableStorage: true
            
            # Network restrictions
            networkProxyDisableAutoDetect: true
          
          assignments:
            - target:
                target_type: "groupAssignmentTarget"
                include_groups:
                  - "Manufacturing Devices"
              intent: "apply"
          
          tenant_id: "acme-manufacturing-tenant-id"

  # Client-specific tenant: Acme Legal Services
  - tenant_id: "acme-legal-tenant-id"
    client_name: "Acme Legal Services"
    resources:
      # Legal admin user
      - id: "acme-legal-tenant-id:admin@acmelegal.com"
        type: "entra_user"
        config:
          user_principal_name: "admin@acmelegal.com"
          display_name: "Legal IT Admin"
          mail_nickname: "admin"
          account_enabled: true
          job_title: "IT Administrator"
          department: "IT"
          
          # Legal-specific licenses (higher security requirements)
          licenses:
            - sku_id: "c7df2760-2c81-4ef7-b578-5b5392b571df"  # Office 365 E5
            - sku_id: "b05e124f-c7cc-45a0-a6aa-8cf78c946968"  # Enterprise Mobility + Security E5
            - sku_id: "9f431833-0334-42de-a7dc-70aa40db46db"  # Microsoft 365 E5 Compliance
          
          groups:
            - "Legal Admins"
            - "MSP Managed Users"
            - "High Security Users"
      
      # Legal-specific high-security Conditional Access Policy
      - id: "acme-legal-tenant-id:legal-high-security-policy"
        type: "conditional_access"
        config:
          display_name: "Legal - High Security Access Policy"
          state: "enabled"
          
          conditions:
            users:
              include_groups:
                - "Legal Staff"
                - "Legal Partners"
            
            applications:
              include_applications:
                - "All"
            
            # More restrictive location requirements
            locations:
              include_locations:
                - "Legal Office Networks"
              exclude_locations: []  # No exceptions for legal
          
          grant_controls:
            operator: "AND"  # Require ALL controls
            built_in_controls:
              - "mfa"
              - "compliantDevice"
              - "domainJoinedDevice"
          
          session_controls:
            # Shorter session timeout for legal applications
            sign_in_frequency:
              is_enabled: true
              type: "hours"
              value: 4
              frequency_interval: "timeBased"
            
            # Enhanced cloud app security
            cloud_app_security:
              is_enabled: true
              cloud_app_security_type: "blockDownloads"
          
          tenant_id: "acme-legal-tenant-id"
      
      # Legal compliance device policy
      - id: "acme-legal-tenant-id:legal-compliance-policy"
        type: "intune_policy"
        config:
          display_name: "Legal Compliance Device Policy"
          description: "Enhanced security and compliance for legal devices"
          device_configuration_type: "microsoft.graph.windows10GeneralConfiguration"
          
          settings:
            # Very strict password requirements
            passwordRequired: true
            passwordMinimumLength: 16
            passwordRequiredType: "alphanumeric"
            passwordPreviousPasswordBlockCount: 24
            passwordMinimumCharacterSetCount: 4
            passwordExpirationDays: 60
            passwordMinutesOfInactivityBeforeScreenTimeout: 5
            passwordSignInFailureCountBeforeFactoryReset: 5
            
            # Maximum security settings
            storageRequireMobileDeviceEncryption: true
            storageBlockRemovableStorage: true
            
            # Enhanced Windows Defender
            defenderRequireRealTimeMonitoring: true
            defenderRequireBehaviorMonitoring: true
            defenderRequireNetworkInspectionSystem: true
            defenderScanDownloads: true
            defenderScheduleScanDay: "everyday"
            defenderScanType: "full"
            
            # Block risky applications
            appsBlockWindowsStoreOriginatedApps: true
            
            # Privacy restrictions for confidentiality
            privacyBlockInputPersonalization: true
            privacyBlockActivityFeed: true
            
            # Network security
            networkProxyDisableAutoDetect: true
            
            # Additional legal-specific settings
            microsoftAccountBlocked: true
            microsoftAccountBlockSettingsSync: true
          
          assignments:
            - target:
                target_type: "groupAssignmentTarget"
                include_groups:
                  - "Legal Devices"
                  - "Partner Devices"
              intent: "apply"
          
          tenant_id: "acme-legal-tenant-id"

# MSP Monitoring and Compliance Users
# These users exist across all client tenants for MSP management
  - id: "*:msp-monitor@msp-domain.com"  # Applied to all client tenants
    type: "entra_user"
    config:
      user_principal_name: "msp-monitor@{tenant_domain}"  # Template variable
      display_name: "MSP Monitoring Service"
      mail_nickname: "msp-monitor"
      account_enabled: true
      job_title: "MSP Service Account"
      department: "MSP Operations"
      
      # Standard MSP monitoring licenses
      licenses:
        - sku_id: "c7df2760-2c81-4ef7-b578-5b5392b571df"  # Office 365 E5
      
      groups:
        - "MSP Service Accounts"
        - "Global Readers"
      
      # Exclude from normal conditional access policies
      conditional_access_exclusions:
        - "baseline-mfa-policy"
      
      # Apply to all client tenants
      cascade: true

# MSP Global Policies that apply to all clients
  - id: "*:msp-global-security-policy"
    type: "conditional_access"
    config:
      display_name: "MSP Global - Block Legacy Authentication"
      state: "enabled"
      
      conditions:
        users:
          include_users:
            - "All"
          exclude_users:
            - "msp-*"  # Exclude MSP service accounts
        
        applications:
          include_applications:
            - "All"
        
        client_app_types:
          - "exchangeActiveSync"
          - "other"  # Legacy authentication protocols
      
      grant_controls:
        operator: "OR"
        built_in_controls:
          - "block"
      
      # This policy cascades to all client tenants
      cascade: true

# Configuration inheritance and cascading rules
cascade_rules:
  # MSP baseline policies always apply unless explicitly overridden
  - source: "msp_baseline"
    target: "all_clients"
    merge_strategy: "msp_wins_on_conflict"
    
  # Client-specific policies can override MSP policies for specific resources
  - source: "client_specific"
    target: "client_tenant"
    merge_strategy: "client_wins_on_conflict"
    
  # Security policies from MSP cannot be disabled by clients
  - source: "msp_security_mandatory"
    target: "all_clients"
    merge_strategy: "msp_enforced"
    override_allowed: false

# Multi-tenant monitoring and reporting
monitoring:
  # Aggregate compliance status across all client tenants
  compliance_dashboard: true
  
  # Alert on policy violations across any client tenant
  alert_on_violations: true
  
  # Generate monthly security reports for each client
  monthly_reports: true
  
  # Cross-tenant analytics for MSP insights
  cross_tenant_analytics: true