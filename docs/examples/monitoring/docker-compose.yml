# CFGMS Monitoring Stack with Docker Compose
# This sets up a complete monitoring environment for CFGMS

version: '3.8'

services:
  # CFGMS Controller
  cfgms-controller:
    image: cfgms/controller:latest
    container_name: cfgms-controller
    ports:
      - "9080:9080"   # REST API
      - "8443:8443"   # gRPC
    environment:
      # Monitoring configuration
      - CFGMS_TELEMETRY_ENABLED=true
      - CFGMS_TELEMETRY_SERVICE_NAME=cfgms-controller
      - CFGMS_TELEMETRY_SERVICE_VERSION=v0.2.0
      - CFGMS_TELEMETRY_ENVIRONMENT=development
      - CFGMS_TELEMETRY_OTLP_ENDPOINT=http://jaeger:14268/api/traces
      - CFGMS_TELEMETRY_SAMPLE_RATE=1.0
      
      # Monitoring system configuration
      - CFGMS_MONITORING_ENABLED=true
      - CFGMS_MONITORING_COLLECTION_INTERVAL=30s
      - CFGMS_MONITORING_RETENTION_PERIOD=7d
      
      # Export configuration
      - CFGMS_EXPORT_PROMETHEUS_ENABLED=true
      - CFGMS_EXPORT_PROMETHEUS_ENDPOINT=http://prometheus:9090/api/v1/write
      - CFGMS_EXPORT_ELASTICSEARCH_ENABLED=true
      - CFGMS_EXPORT_ELASTICSEARCH_ENDPOINT=http://elasticsearch:9200
      - CFGMS_EXPORT_ELASTICSEARCH_INDEX=cfgms-logs
    volumes:
      - ./certs:/etc/cfgms/certs
      - ./config:/etc/cfgms/config
    networks:
      - cfgms-monitoring
    depends_on:
      - prometheus
      - elasticsearch
      - jaeger

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: cfgms-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./cfgms_alerts.yml:/etc/prometheus/cfgms_alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - cfgms-monitoring
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: cfgms-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD environment variable}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-dashboard.json:/etc/grafana/provisioning/dashboards/cfgms.json
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    networks:
      - cfgms-monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

  # Elasticsearch for log storage
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: cfgms-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?Set ELASTIC_PASSWORD environment variable}
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - cfgms-monitoring
    restart: unless-stopped

  # Kibana for log visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.0
    container_name: cfgms-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:?Set ELASTIC_PASSWORD environment variable}
    ports:
      - "5601:5601"
    networks:
      - cfgms-monitoring
    depends_on:
      - elasticsearch
    restart: unless-stopped

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: cfgms-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # HTTP collector
      - "14250:14250"  # gRPC collector
    networks:
      - cfgms-monitoring
    restart: unless-stopped

  # AlertManager for alerting
  alertmanager:
    image: prom/alertmanager:latest
    container_name: cfgms-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    networks:
      - cfgms-monitoring
    restart: unless-stopped

  # Log shipping setup (optional)
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.10.0
    container_name: cfgms-filebeat
    user: root
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - output.elasticsearch.hosts=["elasticsearch:9200"]
    networks:
      - cfgms-monitoring
    depends_on:
      - elasticsearch
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
  alertmanager-data:

networks:
  cfgms-monitoring:
    driver: bridge