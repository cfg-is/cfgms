# Filebeat configuration for CFGMS log collection

filebeat.inputs:
- type: container
  paths:
    - '/var/lib/docker/containers/*/*.log'
  
  # Multiline configuration for stack traces
  multiline.pattern: '^\d{4}-\d{2}-\d{2}'
  multiline.negate: true
  multiline.match: after
  
  # Include container metadata
  processors:
    - add_docker_metadata:
        host: "unix:///var/run/docker.sock"
    
    # Parse JSON logs from CFGMS
    - decode_json_fields:
        fields: ["message"]
        target: "cfgms"
        when:
          contains:
            container.image.name: "cfgms"
    
    # Add timestamp parsing
    - timestamp:
        field: cfgms.timestamp
        layouts:
          - '2006-01-02T15:04:05.000Z'
          - '2006-01-02T15:04:05Z'
        test:
          - '2023-12-25T10:30:45.123Z'
    
    # Extract correlation ID for easier searching
    - copy_fields:
        fields:
          - from: cfgms.correlation_id
            to: correlation_id
        fail_on_error: false
    
    # Extract component information
    - copy_fields:
        fields:
          - from: cfgms.component
            to: component
        fail_on_error: false
    
    # Extract log level
    - copy_fields:
        fields:
          - from: cfgms.level
            to: log_level
        fail_on_error: false

# Output to Elasticsearch
output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "cfgms-logs-%{+yyyy.MM.dd}"
  
  # Template settings
  template.enabled: true
  template.name: "cfgms-logs"
  template.pattern: "cfgms-logs-*"
  template.settings:
    index.number_of_shards: 2
    index.number_of_replicas: 1
    index.refresh_interval: "30s"

# Logging configuration
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644

# Monitoring
monitoring.enabled: true
monitoring.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "filebeat-monitoring"

# Processing configuration
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded

# Fields to include in output
fields:
  environment: development
  application: cfgms
fields_under_root: true