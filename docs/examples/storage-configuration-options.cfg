# Storage Configuration Options for CFGMS
# This file demonstrates all possible storage combinations

# Option 1: GitOps + Database (Recommended for MSPs)
# - PostgreSQL for operational data (performance)
# - Git for configuration data (GitOps workflow)
gitops-with-database:
  controller:
    storage:
      operational:
        provider: "database"
        config:
          host: "postgres.internal"
          database: "cfgms_ops"
          username: "cfgms"
          password: "${POSTGRES_PASSWORD}"
      configuration:
        provider: "git"
        config:
          remote_url: "git@github.com:msp/configs.git"
          require_pull_request: true
          sops_enabled: true

# Option 2: All PostgreSQL (High Performance)
# - Both operational and configuration data in PostgreSQL
# - Best for high-throughput environments
all-database:
  controller:
    storage:
      operational:
        provider: "database"
        config:
          host: "postgres-ops.internal"
          database: "cfgms_ops"
      configuration:
        provider: "database"
        config:
          host: "postgres-config.internal"  # Can be same or different DB
          database: "cfgms_configs"

# Option 3: All Git (Full GitOps)
# - Everything version controlled and audited via Git
# - Best for small deployments with strict change management
all-git:
  controller:
    storage:
      operational:
        provider: "git"
        config:
          repository_path: "/data/cfgms-ops"
          remote_url: "git@github.com:company/ops-data.git"
      configuration:
        provider: "git"
        config:
          repository_path: "/data/cfgms-configs"
          remote_url: "git@github.com:company/configs.git"

# Option 4: Development Setup
# - Memory for operational data (ephemeral)
# - Git for configuration data (real workflow testing)
development:
  controller:
    storage:
      operational:
        provider: "memory"
        config: {}  # No configuration needed for memory
      configuration:
        provider: "git"
        config:
          repository_path: "/tmp/dev-configs"
          branch: "develop"

# Option 5: Testing/CI Environment
# - All in-memory for fast, isolated tests
testing:
  controller:
    storage:
      operational:
        provider: "memory"
        config: {}
      configuration:
        provider: "memory"  
        config: {}

# Option 6: Migration Scenario
# - Keep existing database for operational data
# - Start using Git for configuration management
migration:
  controller:
    storage:
      operational:
        provider: "database"
        config:
          host: "existing-db.internal"  # Keep existing setup
          database: "cfgms"
      configuration:
        provider: "git"  # New GitOps workflow
        config:
          repository_path: "/data/migrated-configs"
          remote_url: "git@github.com:company/new-configs.git"

# Key Benefits of This Approach:
# 
# 1. **Flexible Combinations**: Any provider can be used for either data type
# 2. **No Artificial Restrictions**: Same provider can be used for both if desired  
# 3. **Simple Configuration**: Just specify what you want for each data type
# 4. **Migration Friendly**: Easy to change one side without affecting the other
# 5. **Clear Separation**: Operational vs configuration data concerns are separate