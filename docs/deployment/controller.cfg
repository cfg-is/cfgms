# CFGMS Controller — Canonical Boot Configuration
#
# Copy this file to /etc/cfgms/controller.cfg on your controller node.
#
# Before starting the controller, open this file and update the variables
# marked CHANGE below to match your environment.
#
# Quick start: docs/deployment/single-controller/walkthrough.md

# ── REST API ──────────────────────────────────────────────────
# The controller's REST API (HTTPS). Stewards register and receive their
# configs here. To change the listen port, set CFGMS_HTTP_LISTEN_ADDR in
# the systemd unit's Environment= directive.
listen_addr: "0.0.0.0:9080"

# ── Certificates ──────────────────────────────────────────────
# Auto-generates a CA and server/client certificates on first boot
# via `cfgms-controller --init`. Stewards verify the controller's
# certificate using the CA fingerprint printed during initialization.
certificate:
  enable_cert_management: true
  ca_path: "/var/lib/cfgms/certs/ca"
  cert_path: "/var/lib/cfgms/certs"
  renewal_threshold_days: 30
  server_cert_validity_days: 365
  client_cert_validity_days: 365
  server:
    # CHANGE: Your controller's hostname or IP address.
    common_name: "controller.example.com"
    # CHANGE: All hostnames and domains this controller is reachable at.
    dns_names:
      - "controller.example.com"
      - "localhost"
    # CHANGE: All IP addresses this controller is reachable at (include 127.0.0.1).
    ip_addresses:
      - "127.0.0.1"
    # CHANGE: Your organization name (embedded in generated certificates).
    organization: "My Organization"

# ── Storage ───────────────────────────────────────────────────
# Local Git repository. Stores controller state, steward registrations,
# and fleet configs. SOPS encryption can be layered on top —
# see docs/deployment/README.md for the secrets backend guide.
storage:
  provider: "git"
  config:
    repository_path: "/var/lib/cfgms/storage"
    branch: "main"
    auto_init: true

# ── Logging ───────────────────────────────────────────────────
logging:
  level: "info"
  provider: "file"
  config:
    directory: "/var/log/cfgms"
    max_file_size: 10485760
    max_files: 5

# ── Transport (gRPC-over-QUIC) ────────────────────────────────
# Stewards connect to this port over UDP using mTLS. The port must match
# the STEWARD_CONTROLLER_URL used when building steward binaries.
transport:
  # CHANGE: Port for steward connections (UDP). Default is 4433.
  listen_addr: "0.0.0.0:4433"
  use_cert_manager: true
  max_connections: 50000
  keepalive_period: "30s"
  idle_timeout: "5m"
