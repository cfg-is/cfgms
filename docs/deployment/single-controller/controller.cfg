# CFGMS Controller Configuration
#
# Copy this file to /etc/cfgms/controller.cfg on your controller node.
#
# Before starting the controller, open this file and verify the variables
# marked with CHANGE below match your environment.

# ── REST API ──────────────────────────────────────────────────
# The REST API listens on port 9080 by default. To change it, set the
# CFGMS_HTTP_LISTEN_ADDR environment variable (e.g. in the systemd unit).
# The listen_addr below is used for internal gRPC services.
listen_addr: "0.0.0.0:9080"

# ── Certificates ──────────────────────────────────────────────
# Auto-generates a CA and server/client certificates on first boot.
certificate:
  enable_cert_management: true
  ca_path: "/var/lib/cfgms/certs/ca"
  cert_path: "/var/lib/cfgms/certs"
  renewal_threshold_days: 30
  server_cert_validity_days: 365
  client_cert_validity_days: 365
  server:
    # CHANGE: Your controller's hostname or IP address.
    common_name: "controller.example.com"
    # CHANGE: All hostnames and domains this controller is reachable at.
    dns_names:
      - "controller.example.com"
      - "localhost"
    # CHANGE: All IP addresses this controller is reachable at.
    ip_addresses:
      - "127.0.0.1"
    # CHANGE: Your organization name (embedded in generated certificates).
    organization: "My Organization"

# ── Storage ───────────────────────────────────────────────────
# Local Git repository with optional SOPS encryption.
storage:
  provider: "git"
  config:
    repository_path: "/var/lib/cfgms/storage"
    branch: "main"
    auto_init: true

# ── Logging ───────────────────────────────────────────────────
logging:
  level: "info"
  provider: "file"
  config:
    directory: "/var/log/cfgms"
    max_file_size: 10485760
    max_files: 5

# ── Transport (gRPC-over-QUIC) ────────────────────────────────
# Stewards connect to this port over UDP.
transport:
  # CHANGE: Set the port for steward connections. Default is 4433.
  listen_addr: "0.0.0.0:4433"
  use_cert_manager: true
  max_connections: 50000
  keepalive_period: "30s"
  idle_timeout: "5m"
