# CFGMS Controller-Steward Configuration
#
# This is the steward that manages the controller node itself. It ensures
# directories, packages, firewall rules, and the systemd service stay in
# the desired state. If anything drifts, the steward converges it back.
#
# Copy this file to /etc/cfgms/controller-steward.cfg on your controller node.
#
# Before running, open this file and verify the variables marked with
# CHANGE below. These MUST match the values you set in controller.cfg:
#
#   controller.example.com  — your controller's hostname or IP
#   9080                    — REST API port (default, override via CFGMS_HTTP_LISTEN_ADDR)
#   4433                    — transport port (must match transport.listen_addr in controller.cfg)
#   My Organization         — your organization name

steward:
  id: "controller-node"
  mode: "standalone"
  logging:
    level: "info"

resources:
  # ── Directories ──────────────────────────────────────────────

  - name: "cfgms-config-dir"
    module: "directory"
    config:
      path: "/etc/cfgms"
      owner: "root"
      group: "root"
      permissions: 755

  - name: "cfgms-data-dir"
    module: "directory"
    config:
      path: "/var/lib/cfgms"
      owner: "root"
      group: "root"
      permissions: 755

  - name: "cfgms-ca-dir"
    module: "directory"
    config:
      path: "/var/lib/cfgms/certs/ca"
      owner: "root"
      group: "root"
      permissions: 700

  - name: "cfgms-cert-dir"
    module: "directory"
    config:
      path: "/var/lib/cfgms/certs"
      owner: "root"
      group: "root"
      permissions: 750

  - name: "cfgms-log-dir"
    module: "directory"
    config:
      path: "/var/log/cfgms"
      owner: "root"
      group: "root"
      permissions: 755

  - name: "cfgms-storage-dir"
    module: "directory"
    config:
      path: "/var/lib/cfgms/storage"
      owner: "root"
      group: "root"
      permissions: 755

  # ── Prerequisites ────────────────────────────────────────────

  - name: "install-git"
    module: "package"
    config:
      packages:
        - name: "git"
          state: "installed"

  # ── Controller configuration ─────────────────────────────────
  # This writes /etc/cfgms/controller.cfg from the steward.
  # CHANGE: Update all values below to match your environment.

  - name: "controller-config"
    module: "file"
    config:
      path: "/etc/cfgms/controller.cfg"
      owner: "root"
      group: "root"
      permissions: 600
      content: |
        listen_addr: "0.0.0.0:9080"

        certificate:
          enable_cert_management: true
          ca_path: "/var/lib/cfgms/certs/ca"
          cert_path: "/var/lib/cfgms/certs"
          renewal_threshold_days: 30
          server_cert_validity_days: 365
          client_cert_validity_days: 365
          server:
            # CHANGE: Your controller's hostname or IP address.
            common_name: "controller.example.com"
            # CHANGE: All hostnames/domains the controller is reachable at.
            dns_names:
              - "controller.example.com"
              - "localhost"
            # CHANGE: All IP addresses the controller is reachable at.
            ip_addresses:
              - "127.0.0.1"
            # CHANGE: Your organization name.
            organization: "My Organization"

        storage:
          provider: "git"
          config:
            repository_path: "/var/lib/cfgms/storage"
            branch: "main"
            auto_init: true

        logging:
          level: "info"
          provider: "file"
          config:
            directory: "/var/log/cfgms"
            max_file_size: 10485760
            max_files: 5

        transport:
          listen_addr: "0.0.0.0:4433"
          use_cert_manager: true
          max_connections: 50000
          keepalive_period: "30s"
          idle_timeout: "5m"

  # ── Firewall ─────────────────────────────────────────────────
  # CHANGE: Ports must match the REST API and transport ports above.

  - name: "controller-rest-port"
    module: "firewall"
    config:
      rules:
        - name: "allow-cfgms-rest"
          port: 9080
          protocol: "tcp"
          action: "allow"
          source: "0.0.0.0/0"

  - name: "controller-transport-port"
    module: "firewall"
    config:
      rules:
        - name: "allow-cfgms-transport"
          port: 4433
          protocol: "udp"
          action: "allow"
          source: "0.0.0.0/0"

  # ── Systemd service ──────────────────────────────────────────

  - name: "controller-systemd-unit"
    module: "file"
    config:
      path: "/etc/systemd/system/cfgms-controller.service"
      owner: "root"
      group: "root"
      permissions: 644
      content: |
        [Unit]
        Description=CFGMS Controller
        After=network-online.target
        Wants=network-online.target

        [Service]
        Type=simple
        ExecStart=/usr/local/bin/cfgms-controller --config /etc/cfgms/controller.cfg
        Restart=on-failure
        RestartSec=5
        User=root
        WorkingDirectory=/var/lib/cfgms
        StandardOutput=journal
        StandardError=journal
        SyslogIdentifier=cfgms-controller

        [Install]
        WantedBy=multi-user.target

  # ── Start controller (only after initialization) ─────────────

  - name: "enable-controller-service"
    module: "script"
    config:
      interpreter: "/bin/bash"
      content: |
        #!/bin/bash
        # Only enable and start the controller if it has been initialized.
        # The .cfgms-initialized marker is created by: cfgms-controller --init
        if [ -f /var/lib/cfgms/certs/ca/.cfgms-initialized ]; then
          systemctl daemon-reload
          systemctl enable cfgms-controller
          if ! systemctl is-active --quiet cfgms-controller; then
            systemctl start cfgms-controller
          fi
        else
          echo "Controller not yet initialized."
          echo "Run: sudo cfgms-controller --init --config /etc/cfgms/controller.cfg"
        fi
      timeout: "30s"
