# CFGMS Steward — Canonical Boot Configuration
#
# Copy this file to /etc/cfgms/steward.cfg on each endpoint you want to manage.
#
# This file covers steward identity and basic runtime settings. It does NOT
# define what the steward manages — those are fleet configs, pushed separately
# from the controller once the steward is registered:
#
#   cfg config upload --steward <STEWARD_ID> --config role-config.cfg
#
# Ready-to-use role config recipes (web server, database, domain controller, etc.):
#   docs/examples/role-configs/
#
# Before deploying, build the steward binary with your controller URL compiled in:
#
#   make build-steward STEWARD_CONTROLLER_URL=https://controller.example.com:9080
#
# Then copy this file to the endpoint and update the variables marked CHANGE below.

steward:
  # CHANGE: A unique identifier for this steward instance. Use the hostname or a
  # descriptive label (e.g. "web-01", "db-prod-east"). The controller uses this
  # to identify the endpoint in the fleet view and to route pushed configs.
  id: "my-host-01"

  # Operation mode:
  #   standalone  — applies resources defined in this file and exits (or loops
  #                 with converge_interval). Use this for most deployments.
  #   controller  — legacy; registers with the controller for pushed configs.
  mode: "standalone"

  # How often the steward re-runs to converge drift back to desired state.
  # Remove this field to run once and exit (useful for one-shot scripts).
  converge_interval: "30m"

  logging:
    level: "info"
    format: "text"

  error_handling:
    module_load_failure: "warn"
    resource_failure: "warn"
    configuration_error: "fail"

# Resources this steward manages (packages, files, firewall rules, etc.).
# Leave empty for a controller-connected steward — the controller pushes
# role-specific configs via `cfg config upload`. See docs/examples/role-configs/
# for ready-to-use recipes for common server roles.
resources: []
