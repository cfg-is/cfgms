# CFGMS Steward — Windows Domain Controller
#
# Manages a Windows Server running Active Directory Domain Services.
# Ensures AD management tools are present, core services are monitored,
# DNS/DHCP firewall rules are in place, and audit logging is configured.
#
# CHANGE: Search for "CHANGE:" below and update for your environment.

steward:
  id: "domain-controller"
  mode: "standalone"
  logging:
    level: "info"

resources:
  # ── AD Management Tools ──────────────────────────────────────
  # Ensures RSAT and AD administration tools are installed.

  - name: "ad-management-tools"
    module: "package"
    config:
      packages:
        - name: "RSAT-AD-Tools"
          state: "installed"
          provider: "windowsfeature"
        - name: "RSAT-DNS-Server"
          state: "installed"
          provider: "windowsfeature"
        - name: "RSAT-DHCP"
          state: "installed"
          provider: "windowsfeature"
        - name: "GPMC"
          state: "installed"
          provider: "windowsfeature"

  # ── Directories ──────────────────────────────────────────────

  - name: "ad-backup-dir"
    module: "directory"
    config:
      # CHANGE: Path for AD backup storage.
      path: "C:\\Backups\\ActiveDirectory"
      permissions: 755

  - name: "gpo-backup-dir"
    module: "directory"
    config:
      # CHANGE: Path for GPO backup storage.
      path: "C:\\Backups\\GPO"
      permissions: 755

  # ── DNS/DHCP Firewall Rules ──────────────────────────────────

  - name: "dns-firewall"
    module: "firewall"
    config:
      rules:
        - name: "allow-dns-tcp"
          port: 53
          protocol: "tcp"
          action: "allow"
          direction: "inbound"
          description: "DNS TCP queries"
        - name: "allow-dns-udp"
          port: 53
          protocol: "udp"
          action: "allow"
          direction: "inbound"
          description: "DNS UDP queries"

  - name: "dhcp-firewall"
    module: "firewall"
    config:
      rules:
        - name: "allow-dhcp-server"
          port: 67
          protocol: "udp"
          action: "allow"
          direction: "inbound"
          description: "DHCP server"

  - name: "ad-replication-firewall"
    module: "firewall"
    config:
      rules:
        - name: "allow-ldap"
          port: 389
          protocol: "tcp"
          action: "allow"
          direction: "inbound"
          description: "LDAP"
        - name: "allow-ldaps"
          port: 636
          protocol: "tcp"
          action: "allow"
          direction: "inbound"
          description: "LDAP over TLS"
        - name: "allow-kerberos"
          port: 88
          protocol: "tcp"
          action: "allow"
          direction: "inbound"
          description: "Kerberos authentication"
        - name: "allow-kerberos-udp"
          port: 88
          protocol: "udp"
          action: "allow"
          direction: "inbound"
          description: "Kerberos authentication UDP"

  # ── Audit Policy ─────────────────────────────────────────────
  # Enables advanced audit logging for security-relevant AD events.

  - name: "enable-ad-auditing"
    module: "script"
    config:
      interpreter: "powershell"
      content: |
        # Enable audit policy for account logon and management events
        auditpol /set /category:"Account Logon" /success:enable /failure:enable
        auditpol /set /category:"Account Management" /success:enable /failure:enable
        auditpol /set /category:"DS Access" /success:enable /failure:enable
        auditpol /set /category:"Logon/Logoff" /success:enable /failure:enable
      timeout: "60s"

  # ── Scheduled AD Backup ──────────────────────────────────────
  # Creates a nightly system state backup for AD recovery.

  - name: "ad-backup-script"
    module: "file"
    config:
      # CHANGE: Path for the backup script.
      path: "C:\\Scripts\\Backup-AD.ps1"
      permissions: 644
      content: |
        # AD System State Backup
        # Runs nightly via scheduled task
        $BackupPath = "C:\Backups\ActiveDirectory"
        $Date = Get-Date -Format "yyyy-MM-dd"
        wbadmin start systemstatebackup -backupTarget:$BackupPath -quiet

        # Clean up backups older than 7 days
        Get-ChildItem $BackupPath -Directory |
          Where-Object { $_.CreationTime -lt (Get-Date).AddDays(-7) } |
          Remove-Item -Recurse -Force
