# CFGMS Steward — Linux Database Server (PostgreSQL)
#
# Manages a Linux server running PostgreSQL. Ensures PostgreSQL is
# installed, data directories exist, pg_hba.conf allows application
# connections, backups are scheduled, and firewall rules are in place.
#
# CHANGE: Search for "CHANGE:" below and update for your environment.

steward:
  id: "database-server"
  mode: "standalone"
  logging:
    level: "info"

resources:
  # ── PostgreSQL Package ───────────────────────────────────────

  - name: "install-postgresql"
    module: "package"
    config:
      packages:
        - name: "postgresql"
          state: "installed"
        - name: "postgresql-client"
          state: "installed"

  # ── Data Directories ─────────────────────────────────────────
  # CHANGE: Update paths if you use a dedicated data volume.

  - name: "pg-backup-dir"
    module: "directory"
    config:
      path: "/var/backups/postgresql"
      owner: "postgres"
      group: "postgres"
      permissions: 700

  - name: "pg-archive-dir"
    module: "directory"
    config:
      path: "/var/lib/postgresql/wal-archive"
      owner: "postgres"
      group: "postgres"
      permissions: 700

  # ── Client Authentication ────────────────────────────────────
  # Controls which hosts can connect to PostgreSQL and how they authenticate.
  # CHANGE: Update the CIDR ranges to match your application server subnets.

  - name: "pg-hba-config"
    module: "file"
    config:
      # CHANGE: Path varies by PostgreSQL version.
      path: "/etc/postgresql/16/main/pg_hba.conf"
      owner: "postgres"
      group: "postgres"
      permissions: 640
      content: |
        # TYPE  DATABASE        USER            ADDRESS                 METHOD

        # Local connections
        local   all             postgres                                peer
        local   all             all                                     peer

        # IPv4 local connections
        host    all             all             127.0.0.1/32            scram-sha-256

        # CHANGE: Application server subnet — adjust CIDR and database name.
        host    appdb           appuser         10.0.1.0/24             scram-sha-256

        # CHANGE: Monitoring/backup subnet.
        host    all             replicator      10.0.2.0/24             scram-sha-256

  # ── PostgreSQL Tuning ────────────────────────────────────────
  # Basic performance settings. Applied via a conf.d drop-in so the
  # main postgresql.conf stays untouched.

  - name: "pg-tuning"
    module: "file"
    config:
      # CHANGE: Path varies by PostgreSQL version.
      path: "/etc/postgresql/16/main/conf.d/90-cfgms-tuning.conf"
      owner: "postgres"
      group: "postgres"
      permissions: 644
      content: |
        # CHANGE: Tune these for your server's RAM and workload.
        # Rule of thumb: shared_buffers = 25% of RAM, effective_cache_size = 75% of RAM.
        shared_buffers = '4GB'
        effective_cache_size = '12GB'
        work_mem = '64MB'
        maintenance_work_mem = '512MB'

        # WAL settings for durability + archiving
        wal_level = 'replica'
        archive_mode = on
        archive_command = 'cp %p /var/lib/postgresql/wal-archive/%f'

        # Logging
        log_min_duration_statement = 1000
        log_checkpoints = on
        log_connections = on
        log_disconnections = on

  # ── Firewall Rules ───────────────────────────────────────────

  - name: "pg-firewall"
    module: "firewall"
    config:
      rules:
        - name: "allow-postgresql"
          port: 5432
          protocol: "tcp"
          action: "allow"
          direction: "inbound"
          # CHANGE: Restrict to your application server subnet.
          source: "10.0.0.0/8"
          description: "PostgreSQL"

  # ── Nightly Backup ──────────────────────────────────────────

  - name: "pg-backup-script"
    module: "file"
    config:
      path: "/usr/local/bin/pg-backup.sh"
      owner: "root"
      group: "root"
      permissions: 755
      content: |
        #!/bin/bash
        # Nightly PostgreSQL backup with 7-day retention
        # CHANGE: Update the database list or use --all for everything.

        BACKUP_DIR="/var/backups/postgresql"
        RETENTION_DAYS=7
        DATE=$(date +%Y-%m-%d)

        # Dump all databases
        sudo -u postgres pg_dumpall --clean | gzip > "$BACKUP_DIR/all-databases-$DATE.sql.gz"

        # Clean up old backups
        find "$BACKUP_DIR" -name "*.sql.gz" -mtime +$RETENTION_DAYS -delete

  - name: "pg-backup-cron"
    module: "file"
    config:
      path: "/etc/cron.d/pg-backup"
      owner: "root"
      group: "root"
      permissions: 644
      content: |
        # Nightly PostgreSQL backup at 2 AM
        0 2 * * * root /usr/local/bin/pg-backup.sh >> /var/log/pg-backup.log 2>&1
