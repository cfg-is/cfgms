# CFGMS Steward — Linux Web Server (nginx)
#
# Manages a Linux server running nginx as a reverse proxy or web server.
# Ensures nginx is installed, site configuration is deployed, TLS
# certificate directories exist, and HTTP/HTTPS firewall rules are in place.
#
# CHANGE: Search for "CHANGE:" below and update for your environment.

steward:
  id: "web-server"
  mode: "standalone"
  logging:
    level: "info"

resources:
  # ── nginx Package ────────────────────────────────────────────

  - name: "install-nginx"
    module: "package"
    config:
      packages:
        - name: "nginx"
          state: "installed"

  # ── TLS Certificate Directory ────────────────────────────────

  - name: "tls-cert-dir"
    module: "directory"
    config:
      # CHANGE: Path where TLS certs are stored (e.g. from certbot or internal CA).
      path: "/etc/nginx/ssl"
      owner: "root"
      group: "root"
      permissions: 700

  # ── Site Configuration ───────────────────────────────────────
  # CHANGE: Update server_name, upstream, and certificate paths.

  - name: "nginx-site-config"
    module: "file"
    config:
      path: "/etc/nginx/sites-available/app.conf"
      owner: "root"
      group: "root"
      permissions: 644
      content: |
        server {
            listen 80;
            # CHANGE: Your site's domain name.
            server_name app.example.com;
            return 301 https://$host$request_uri;
        }

        server {
            listen 443 ssl http2;
            # CHANGE: Your site's domain name.
            server_name app.example.com;

            # CHANGE: Paths to your TLS certificate and key.
            ssl_certificate     /etc/nginx/ssl/app.example.com.crt;
            ssl_certificate_key /etc/nginx/ssl/app.example.com.key;

            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_ciphers HIGH:!aNULL:!MD5;

            location / {
                # CHANGE: Upstream application address and port.
                proxy_pass http://127.0.0.1:8080;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }

  - name: "enable-site"
    module: "script"
    config:
      interpreter: "/bin/bash"
      content: |
        #!/bin/bash
        LINK="/etc/nginx/sites-enabled/app.conf"
        TARGET="/etc/nginx/sites-available/app.conf"
        if [ ! -L "$LINK" ]; then
          ln -s "$TARGET" "$LINK"
        fi
        # Remove default site if it exists
        rm -f /etc/nginx/sites-enabled/default
        nginx -t && systemctl reload nginx
      timeout: "30s"

  # ── Firewall Rules ───────────────────────────────────────────

  - name: "web-firewall"
    module: "firewall"
    config:
      rules:
        - name: "allow-http"
          port: 80
          protocol: "tcp"
          action: "allow"
          direction: "inbound"
          description: "HTTP"
        - name: "allow-https"
          port: 443
          protocol: "tcp"
          action: "allow"
          direction: "inbound"
          description: "HTTPS"

  # ── Log Rotation ─────────────────────────────────────────────

  - name: "nginx-logrotate"
    module: "file"
    config:
      path: "/etc/logrotate.d/nginx-cfgms"
      owner: "root"
      group: "root"
      permissions: 644
      content: |
        /var/log/nginx/*.log {
            daily
            missingok
            rotate 14
            compress
            delaycompress
            notifempty
            sharedscripts
            postrotate
                [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid)
            endscript
        }
