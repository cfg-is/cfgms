# CFGMS Steward — Windows SQL Server
#
# Manages a Windows Server running Microsoft SQL Server.
# Ensures backup directories exist, SQL ports are open, TempDB
# is on a dedicated path, and automated backups are scheduled.
#
# CHANGE: Search for "CHANGE:" below and update for your environment.

steward:
  id: "sql-server"
  mode: "standalone"
  logging:
    level: "info"

resources:
  # ── SQL Server Directories ──────────────────────────────────
  # CHANGE: Update paths to match your disk layout.

  - name: "sql-data-dir"
    module: "directory"
    config:
      path: "D:\\MSSQL\\Data"
      permissions: 755

  - name: "sql-log-dir"
    module: "directory"
    config:
      path: "E:\\MSSQL\\Logs"
      permissions: 755

  - name: "sql-tempdb-dir"
    module: "directory"
    config:
      path: "F:\\MSSQL\\TempDB"
      permissions: 755

  - name: "sql-backup-dir"
    module: "directory"
    config:
      path: "G:\\MSSQL\\Backups"
      permissions: 755

  # ── SQL Management Tools ─────────────────────────────────────

  - name: "sql-management-tools"
    module: "package"
    config:
      packages:
        - name: "Microsoft.SQLServerManagementStudio"
          state: "installed"
          provider: "winget"

  # ── SQL Firewall Rules ───────────────────────────────────────

  - name: "sql-firewall"
    module: "firewall"
    config:
      rules:
        - name: "allow-sql-default"
          # CHANGE: Update port if your instance uses a non-default port.
          port: 1433
          protocol: "tcp"
          action: "allow"
          direction: "inbound"
          # CHANGE: Restrict to your application server subnet.
          source: "10.0.0.0/8"
          description: "SQL Server default instance"
        - name: "allow-sql-browser"
          port: 1434
          protocol: "udp"
          action: "allow"
          direction: "inbound"
          source: "10.0.0.0/8"
          description: "SQL Server Browser service"

  # ── SQL Backup Script ────────────────────────────────────────
  # Nightly full backup of all user databases with 7-day retention.

  - name: "sql-backup-script"
    module: "file"
    config:
      path: "C:\\Scripts\\Backup-SQL.ps1"
      permissions: 644
      content: |
        # SQL Server Nightly Backup
        # CHANGE: Update the instance name and backup path.
        $InstanceName = "MSSQLSERVER"
        $BackupPath = "G:\MSSQL\Backups"
        $RetentionDays = 7
        $Date = Get-Date -Format "yyyy-MM-dd"

        # Load SQL Server module
        Import-Module SqlServer -ErrorAction SilentlyContinue

        # Backup all user databases
        $databases = Invoke-Sqlcmd -Query "SELECT name FROM sys.databases WHERE database_id > 4 AND state = 0"
        foreach ($db in $databases) {
          $dbName = $db.name
          $backupFile = Join-Path $BackupPath "$dbName-$Date.bak"
          Backup-SqlDatabase -ServerInstance "localhost" -Database $dbName -BackupFile $backupFile -CompressionOption On
        }

        # Clean up old backups
        Get-ChildItem $BackupPath -Filter "*.bak" |
          Where-Object { $_.LastWriteTime -lt (Get-Date).AddDays(-$RetentionDays) } |
          Remove-Item -Force

  # ── SQL Max Memory Configuration ─────────────────────────────
  # Prevents SQL Server from consuming all available RAM.

  - name: "sql-memory-config"
    module: "script"
    config:
      interpreter: "powershell"
      content: |
        # CHANGE: Set max memory in MB. Rule of thumb: total RAM minus 4 GB for OS.
        $MaxMemoryMB = 12288

        $currentMax = Invoke-Sqlcmd -Query "SELECT value_in_use FROM sys.configurations WHERE name = 'max server memory (MB)'"
        if ($currentMax.value_in_use -ne $MaxMemoryMB) {
          Invoke-Sqlcmd -Query "EXEC sp_configure 'max server memory', $MaxMemoryMB; RECONFIGURE;"
        }
      timeout: "30s"
