# CFGMS Steward — Windows Hyper-V Host
#
# Manages a Windows Server running Hyper-V for virtual machine hosting.
# Ensures Hyper-V role is installed, VM storage paths exist, virtual
# switch is configured, and live migration firewall rules are in place.
#
# CHANGE: Search for "CHANGE:" below and update for your environment.

steward:
  id: "hyperv-host"
  mode: "standalone"
  logging:
    level: "info"

resources:
  # ── Hyper-V Role ─────────────────────────────────────────────

  - name: "hyperv-features"
    module: "package"
    config:
      packages:
        - name: "Hyper-V"
          state: "installed"
          provider: "windowsfeature"
        - name: "Hyper-V-Tools"
          state: "installed"
          provider: "windowsfeature"
        - name: "Hyper-V-PowerShell"
          state: "installed"
          provider: "windowsfeature"

  # ── VM Storage Directories ──────────────────────────────────
  # CHANGE: Update paths to match your storage layout.

  - name: "vm-disk-dir"
    module: "directory"
    config:
      path: "D:\\Hyper-V\\Virtual Hard Disks"
      permissions: 755

  - name: "vm-config-dir"
    module: "directory"
    config:
      path: "D:\\Hyper-V\\Virtual Machines"
      permissions: 755

  - name: "vm-checkpoint-dir"
    module: "directory"
    config:
      path: "D:\\Hyper-V\\Checkpoints"
      permissions: 755

  - name: "vm-export-dir"
    module: "directory"
    config:
      path: "E:\\Hyper-V\\Exports"
      permissions: 755

  # ── Virtual Switch ───────────────────────────────────────────
  # Creates an external virtual switch bound to the physical NIC.

  - name: "create-virtual-switch"
    module: "script"
    config:
      interpreter: "powershell"
      content: |
        # CHANGE: Set the switch name and physical adapter name.
        $SwitchName = "External-vSwitch"
        $AdapterName = "Ethernet"

        $existing = Get-VMSwitch -Name $SwitchName -ErrorAction SilentlyContinue
        if (-not $existing) {
          New-VMSwitch -Name $SwitchName -NetAdapterName $AdapterName -AllowManagementOS $true
        }
      timeout: "60s"

  # ── Hyper-V Default Paths ────────────────────────────────────
  # Sets the default storage locations for new VMs.

  - name: "set-hyperv-defaults"
    module: "script"
    config:
      interpreter: "powershell"
      content: |
        # CHANGE: Must match the directory paths above.
        Set-VMHost -VirtualHardDiskPath "D:\Hyper-V\Virtual Hard Disks"
        Set-VMHost -VirtualMachinePath "D:\Hyper-V\Virtual Machines"
      timeout: "30s"

  # ── Live Migration Firewall ──────────────────────────────────

  - name: "hyperv-firewall"
    module: "firewall"
    config:
      rules:
        - name: "allow-live-migration"
          port: 6600
          protocol: "tcp"
          action: "allow"
          direction: "inbound"
          # CHANGE: Restrict to your Hyper-V cluster subnet.
          source: "10.0.0.0/24"
          description: "Hyper-V live migration"
        - name: "allow-vm-management"
          port: 2179
          protocol: "tcp"
          action: "allow"
          direction: "inbound"
          source: "10.0.0.0/24"
          description: "Hyper-V VM management"

  # ── NUMA Spanning ────────────────────────────────────────────
  # Disables NUMA spanning for better VM performance on multi-socket hosts.

  - name: "disable-numa-spanning"
    module: "script"
    config:
      interpreter: "powershell"
      content: |
        $current = (Get-VMHost).NumaSpanningEnabled
        if ($current -eq $true) {
          Set-VMHost -NumaSpanningEnabled $false
          # Note: requires a reboot to take effect
        }
      timeout: "30s"
