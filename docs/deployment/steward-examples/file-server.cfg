# CFGMS Steward — Windows File Server
#
# Manages a Windows Server providing file shares via SMB.
# Ensures share directories exist, DFS tools are installed,
# shadow copies are configured, and SMB firewall rules are in place.
#
# CHANGE: Search for "CHANGE:" below and update for your environment.

steward:
  id: "file-server"
  mode: "standalone"
  logging:
    level: "info"

resources:
  # ── File Server Features ─────────────────────────────────────

  - name: "file-server-features"
    module: "package"
    config:
      packages:
        - name: "FS-FileServer"
          state: "installed"
          provider: "windowsfeature"
        - name: "FS-DFS-Namespace"
          state: "installed"
          provider: "windowsfeature"
        - name: "FS-DFS-Replication"
          state: "installed"
          provider: "windowsfeature"
        - name: "FS-Resource-Manager"
          state: "installed"
          provider: "windowsfeature"

  # ── Share Directories ────────────────────────────────────────
  # CHANGE: Update paths and names to match your share layout.

  - name: "shared-data-dir"
    module: "directory"
    config:
      path: "D:\\Shares\\Data"
      permissions: 755

  - name: "shared-users-dir"
    module: "directory"
    config:
      path: "D:\\Shares\\Users"
      permissions: 755

  - name: "shared-departments-dir"
    module: "directory"
    config:
      path: "D:\\Shares\\Departments"
      permissions: 755

  # ── SMB Firewall Rules ───────────────────────────────────────

  - name: "smb-firewall"
    module: "firewall"
    config:
      rules:
        - name: "allow-smb"
          port: 445
          protocol: "tcp"
          action: "allow"
          direction: "inbound"
          # CHANGE: Restrict to your internal subnet.
          source: "10.0.0.0/8"
          description: "SMB file sharing"

  # ── Shadow Copies ────────────────────────────────────────────
  # Enables Volume Shadow Copy on the data drive for file recovery.

  - name: "enable-shadow-copies"
    module: "script"
    config:
      interpreter: "powershell"
      content: |
        # CHANGE: Update the drive letter to match your data volume.
        $Volume = "D:"

        # Enable shadow copies if not already configured
        $existing = vssadmin list shadowstorage 2>&1
        if ($existing -notmatch $Volume) {
          vssadmin add shadowstorage /for=$Volume /on=$Volume /maxsize=10%
        }

        # Create a shadow copy schedule (7 AM and 12 PM weekdays)
        $taskExists = schtasks /query /tn "ShadowCopy-$Volume" 2>&1
        if ($LASTEXITCODE -ne 0) {
          schtasks /create /tn "ShadowCopy-$Volume" /sc daily /st 07:00 /ru SYSTEM `
            /tr "vssadmin create shadow /for=$Volume"
        }
      timeout: "60s"

  # ── Disk Space Monitoring ────────────────────────────────────
  # Writes a warning to the event log if free space drops below threshold.

  - name: "disk-space-check"
    module: "script"
    config:
      interpreter: "powershell"
      content: |
        # CHANGE: Update drive letter and threshold percentage.
        $Drive = "D:"
        $ThresholdPercent = 10

        $disk = Get-WmiObject Win32_LogicalDisk -Filter "DeviceID='$Drive'"
        $freePercent = [math]::Round(($disk.FreeSpace / $disk.Size) * 100, 1)

        if ($freePercent -lt $ThresholdPercent) {
          Write-EventLog -LogName Application -Source "CFGMS" -EventId 1001 -EntryType Warning `
            -Message "Low disk space on $Drive - ${freePercent}% free"
        }
      timeout: "30s"
