# CFGMS Steward — Linux Docker Host
#
# Manages a Linux server running Docker for container workloads.
# Ensures Docker is installed, daemon.json is configured with sane
# defaults, log rotation is in place, and storage directories exist.
#
# CHANGE: Search for "CHANGE:" below and update for your environment.

steward:
  id: "docker-host"
  mode: "standalone"
  logging:
    level: "info"

resources:
  # ── Docker Prerequisites ─────────────────────────────────────

  - name: "docker-prerequisites"
    module: "package"
    config:
      packages:
        - name: "ca-certificates"
          state: "installed"
        - name: "curl"
          state: "installed"
        - name: "gnupg"
          state: "installed"

  # ── Docker Engine ────────────────────────────────────────────
  # Installs Docker CE from the official repository.

  - name: "install-docker"
    module: "script"
    config:
      interpreter: "/bin/bash"
      content: |
        #!/bin/bash
        # Only install if docker is not already present
        if command -v docker &> /dev/null; then
          echo "Docker already installed: $(docker --version)"
          exit 0
        fi

        # Add Docker's official GPG key and repository
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc

        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
          https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
          > /etc/apt/sources.list.d/docker.list

        apt-get update
        apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
      timeout: "120s"

  # ── Storage Directories ──────────────────────────────────────
  # CHANGE: Update paths if you use a dedicated volume for container data.

  - name: "docker-data-dir"
    module: "directory"
    config:
      path: "/var/lib/docker"
      owner: "root"
      group: "root"
      permissions: 710

  - name: "docker-compose-dir"
    module: "directory"
    config:
      # CHANGE: Where you store your compose files.
      path: "/opt/containers"
      owner: "root"
      group: "docker"
      permissions: 750

  # ── Docker Daemon Configuration ──────────────────────────────
  # Sets log rotation, storage driver, and default address pools.

  - name: "docker-daemon-json"
    module: "file"
    config:
      path: "/etc/docker/daemon.json"
      owner: "root"
      group: "root"
      permissions: 644
      content: |
        {
          "log-driver": "json-file",
          "log-opts": {
            "max-size": "10m",
            "max-file": "3"
          },
          "storage-driver": "overlay2",
          "default-address-pools": [
            {
              "base": "172.17.0.0/12",
              "size": 24
            }
          ],
          "live-restore": true
        }

  # ── Reload Docker after config changes ───────────────────────

  - name: "reload-docker"
    module: "script"
    config:
      interpreter: "/bin/bash"
      content: |
        #!/bin/bash
        systemctl daemon-reload
        if systemctl is-active --quiet docker; then
          systemctl reload docker
        else
          systemctl enable --now docker
        fi
      timeout: "30s"

  # ── Docker Prune Cron ────────────────────────────────────────
  # Weekly cleanup of unused images, containers, and volumes.

  - name: "docker-prune-cron"
    module: "file"
    config:
      path: "/etc/cron.d/docker-prune"
      owner: "root"
      group: "root"
      permissions: 644
      content: |
        # Weekly Docker cleanup — Sunday at 3 AM
        0 3 * * 0 root docker system prune -af --volumes >> /var/log/docker-prune.log 2>&1

  # ── Firewall Rules ───────────────────────────────────────────
  # CHANGE: Open ports for the services your containers expose.

  - name: "docker-firewall"
    module: "firewall"
    config:
      rules:
        - name: "allow-http"
          port: 80
          protocol: "tcp"
          action: "allow"
          direction: "inbound"
          description: "HTTP (container services)"
        - name: "allow-https"
          port: 443
          protocol: "tcp"
          action: "allow"
          direction: "inbound"
          description: "HTTPS (container services)"
