# Base Configuration Example
# Version: 1.0
# Last Updated: 2024-04-20

# Base configuration that applies to all endpoints
# This serves as the foundation for all other configurations

# System settings
system:
  timezone: "UTC"
  ntp:
    enabled: true
    servers:
      - "pool.ntp.org"
  logging:
    level: "info"
    format: "json"
    destination: "file"
    path: "/var/log/cfgms"

# Security settings
security:
  ssh:
    enabled: true
    port: 22
    allowed_users:
      - "admin"
      - "ops"
    password_auth: false
    key_auth: true
  firewall:
    enabled: true
    default_policy: "deny"
    allowed_ports:
      - 22
      - 80
      - 443
  selinux:
    mode: "enforcing"
    policy: "targeted"

# Monitoring settings
monitoring:
  enabled: true
  health_check:
    interval: 60s
    timeout: 5s
    retries: 3
  metrics:
    enabled: true
    interval: 15s
    retention: "7d"
  alert_channels:
    - type: "email"
      address: "alerts@example.com"
    - type: "slack"
      channel: "#alerts"

# Module settings
modules:
  # Service configurations
  service:
    sshd:
      state: "running"
      config:
        port: 22
        permit_root_login: "no"
        password_authentication: "no"
        x11_forwarding: "no"

    # Base monitoring services
    prometheus-node-exporter:
      state: "running"
      config:
        web:
          listen_address: ":9100"
        collectors:
          enabled:
            - "cpu"
            - "meminfo"
            - "diskstats"
            - "filesystem"
            - "netdev"

  # File configurations
  file:
    "/etc/hosts":
      mode: "0644"
      owner: "root"
      group: "root"
      content: |
        127.0.0.1 localhost
        ::1 localhost ip6-localhost ip6-loopback

    "/etc/resolv.conf":
      mode: "0644"
      owner: "root"
      group: "root"
      content: |
        nameserver 8.8.8.8
        nameserver 8.8.4.4
        options timeout:2 attempts:3

# Backup settings
backup:
  enabled: true
  schedule: "0 0 * * *"  # Daily at midnight
  retention: "30d"
  type: "full"
  destination: "s3://backups/"
  include:
    - "/etc"
    - "/var/log"
  exclude:
    - "*.log"
    - "*.tmp"
    - "/tmp"
    - "/proc"
    - "/sys"
