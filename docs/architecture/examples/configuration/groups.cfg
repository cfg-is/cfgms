# Groups Configuration Example
# Version: 1.0
# Last Updated: 2024-04-20

# Define dynamic groups based on DNA attributes
# These groups can be referenced in other configurations

# All groups are defined under a single 'groups' map
groups:
  # Environment-based groups
  prod:
    description: "Production environment"
    match:
      environment: "prod"
    settings:
      monitoring:
        health_check:
          interval: 30s
        alert_channels:
          - type: "pagerduty"
            service_key: "${PAGERDUTY_KEY}"
      backup:
        schedule: "0 */4 * * *"  # Every 4 hours
        retention: "7d"

  staging:
    description: "Staging environment"
    match:
      environment: "staging"
    settings:
      monitoring:
        health_check:
          interval: 60s
        alert_channels:
          - type: "slack"
            channel: "#staging-alerts"
      backup:
        schedule: "0 */6 * * *"  # Every 6 hours
        retention: "3d"

  # Role-based groups
  web_servers:
    description: "Web server role"
    match:
      roles:
        - "web"
    settings:
      security:
        firewall:
          allowed_ports:
            - 80
            - 443
      modules:
        service:
          nginx:
            state: "running"
            config:
              worker_processes: "auto"
              worker_connections: 1024
          redis:
            state: "running"
            config:
              maxmemory: "2gb"
              maxmemory-policy: "allkeys-lru"

  databases:
    description: "Database server role"
    match:
      roles:
        - "db"
    settings:
      security:
        firewall:
          allowed_ports:
            - 5432
            - 6379
      modules:
        service:
          postgresql:
            state: "running"
            config:
              max_connections: 100
              shared_buffers: "1GB"
          redis:
            state: "running"
            config:
              maxmemory: "4gb"
              maxmemory-policy: "volatile-lru"

  # Location-based groups
  us_east:
    description: "US East region"
    match:
      region: "us-east-1"
    settings:
      system:
        timezone: "America/New_York"
      monitoring:
        metrics:
          retention: "14d"

  eu_west:
    description: "EU West region"
    match:
      region: "eu-west-1"
    settings:
      system:
        timezone: "Europe/London"
      monitoring:
        metrics:
          retention: "14d"

  # Application-based groups
  ecommerce:
    description: "E-commerce application"
    match:
      applications:
        - "shop"
        - "cart"
        - "payment"
    settings:
      monitoring:
        health_check:
          interval: 30s
        alert_channels:
          - type: "slack"
            channel: "#ecommerce-alerts"
      backup:
        schedule: "0 */2 * * *"  # Every 2 hours
        retention: "14d"
        include:
          - "/var/www/shop"
          - "/var/www/cart"
          - "/var/www/payment"

  # Infrastructure groups
  critical:
    description: "Critical infrastructure components"
    match:
      tags:
        - "critical"
    settings:
      monitoring:
        health_check:
          interval: 15s
        alert_channels:
          - type: "pagerduty"
            service_key: "${PAGERDUTY_CRITICAL_KEY}"
      backup:
        schedule: "*/30 * * * *"  # Every 30 minutes
        retention: "30d"

  high_availability:
    description: "High availability components"
    match:
      tags:
        - "ha"
    settings:
      monitoring:
        health_check:
          interval: 15s
          retries: 5
        alert_channels:
          - type: "pagerduty"
            service_key: "${PAGERDUTY_HA_KEY}"
      modules:
        service:
          keepalived:
            state: "running"
            config:
              priority: 100
              virtual_router_id: 51
