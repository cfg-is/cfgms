# Endpoint Configuration Example
# Version: 1.0
# Last Updated: 2024-04-20

# Endpoint-specific configuration
# This configuration applies only to this specific endpoint
# and overrides any matching settings from base and group configurations

# Endpoint identification
endpoint:
  id: "web-prod-01"
  name: "Production Web Server 01"
  description: "Primary web server for production environment"

# DNA attributes for group matching
dna:
  environment: "prod"
  roles:
    - "web"
  region: "us-east-1"
  applications:
    - "shop"
    - "cart"
  tags:
    - "critical"
    - "ha"
  hardware:
    cpu_cores: 8
    memory_gb: 32
    disk_gb: 500
  os:
    family: "linux"
    distribution: "ubuntu"
    version: "22.04"

# System settings
system:
  hostname: "web-prod-01"
  timezone: "America/New_York"
  ntp:
    servers:
      - "0.us.pool.ntp.org"
      - "1.us.pool.ntp.org"
    iburst: true

# Security settings
security:
  ssh:
    port: 2222  # Override default SSH port
    allowed_keys:
      - "ssh-rsa AAAA..."  # Admin public key
  firewall:
    allowed_ports:
      - 80
      - 443
      - 2222
    allowed_ips:
      - "10.0.0.0/8"
      - "192.168.1.0/24"

# Monitoring settings
monitoring:
  health_check:
    interval: 15s  # More frequent checks for critical server
    retries: 3
  alert_channels:
    - type: "pagerduty"
      service_key: "${PAGERDUTY_CRITICAL_KEY}"
    - type: "slack"
      channel: "#prod-alerts"

# Module settings
modules:
  service:
    nginx:
      state: "running"
      config:
        worker_processes: 8  # Match CPU cores
        worker_connections: 2048
        keepalive_timeout: 65
        gzip: true
        ssl:
          session_cache: "shared:SSL:10m"
          session_timeout: "10m"
    redis:
      state: "running"
      config:
        maxmemory: "16gb"  # 50% of system memory
        maxmemory-policy: "allkeys-lru"
        appendonly: "yes"
        appendfsync: "everysec"

  file:
    "/etc/nginx/nginx.conf":
      source: "templates/nginx/prod.conf"
      mode: "0644"
      owner: "root"
      group: "root"
      validate: "nginx -t"
    "/etc/redis/redis.conf":
      source: "templates/redis/prod.conf"
      mode: "0644"
      owner: "redis"
      group: "redis"
      validate: "redis-cli ping"

# Backup settings
backup:
  schedule: "*/30 * * * *"  # Every 30 minutes
  retention: "7d"
  include:
    - "/var/www/shop"
    - "/var/www/cart"
    - "/etc/nginx"
    - "/etc/redis"
  exclude:
    - "*.log"
    - "*.tmp"
  destination: "s3://backups/prod/web-prod-01/"

# Custom settings
custom:
  load_balancer:
    weight: 100
    check_interval: 5s
    check_timeout: 3s
    check_retries: 3
  cdn:
    enabled: true
    origin: "web-prod-01.example.com"
    cache_ttl: "1h" 