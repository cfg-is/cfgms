# Inherited Groups Configuration Example
# Version: 1.0
# Last Updated: 2024-04-20

# This file contains groups inherited from parent tenants
# It is automatically generated and should not be manually edited

# Inherited groups from parent tenant
groups:
  # Environment-based groups
  prod:
    description: "Production environment"
    match:
      environment: "prod"
    settings:
      monitoring:
        health_check:
          interval: 30s
        alert_channels:
          - type: "pagerduty"
            service_key: "${PAGERDUTY_KEY}"
      backup:
        schedule: "0 */4 * * *"  # Every 4 hours
        retention: "7d"

  staging:
    description: "Staging environment"
    match:
      environment: "staging"
    settings:
      monitoring:
        health_check:
          interval: 60s
        alert_channels:
          - type: "slack"
            channel: "#staging-alerts"
      backup:
        schedule: "0 */6 * * *"  # Every 6 hours
        retention: "3d"

  # Role-based groups
  web_servers:
    description: "Web server role"
    match:
      roles:
        - "web"
    settings:
      security:
        firewall:
          allowed_ports:
            - 80
            - 443
      modules:
        service:
          nginx:
            state: "running"
            config:
              worker_processes: "auto"
              worker_connections: 1024
          redis:
            state: "running"
            config:
              maxmemory: "2gb"
              maxmemory-policy: "allkeys-lru"

  # Location-based groups
  us_east:
    description: "US East region"
    match:
      region: "us-east-1"
    settings:
      system:
        timezone: "America/New_York"
      monitoring:
        metrics:
          retention: "14d"

  # Infrastructure groups
  critical:
    description: "Critical infrastructure components"
    match:
      tags:
        - "critical"
    settings:
      monitoring:
        health_check:
          interval: 15s
        alert_channels:
          - type: "pagerduty"
            service_key: "${PAGERDUTY_CRITICAL_KEY}"
      backup:
        schedule: "*/30 * * * *"  # Every 30 minutes
        retention: "30d"

