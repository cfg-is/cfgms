# Outpost Configuration Example
# Version: 1.0
# Last Updated: 2024-04-11

# Identity settings
identity:
  name: "outpost-1"
  region: "us-east"
  tags:
    environment: "production"
    role: "proxy-cache"

# Network settings
network:
  listen_addr: ":8443"
  controller_addr: "controller.example.com:8443"
  metrics_addr: ":9090"

# Security settings
security:
  cert_file: "/etc/cfgms/outpost-cert.pem"
  key_file: "/etc/cfgms/outpost-key.pem"
  ca_file: "/etc/cfgms/ca.pem"
  min_tls_version: "1.2"

# Cache settings
cache:
  enabled: true
  max_size: "10GB"
  ttl: "24h"
  cleanup_interval: "1h"
  types:
    - "modules"
    - "workflows"
    - "binaries"

# Network monitoring (v2)
network_monitoring:
  enabled: false  # Enable in v2
  snmp:
    enabled: false
    community: "public"
    version: "2c"
  netflow:
    enabled: false
    listen_addr: ":9995"

# Proxy settings
proxy:
  enabled: true
  max_connections: 1000
  connection_timeout: "30s"
  idle_timeout: "5m"
  buffer_size: "1MB"

# Monitoring configuration
monitoring:
  health_check_interval: "30s"
  metrics_enabled: true
  log_format: "json"
  max_log_size: "100MB"
  max_log_files: 10
