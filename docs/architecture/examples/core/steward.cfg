# Steward Configuration Example
# Version: 1.0
# Last Updated: 2024-04-11

# Identity settings
identity:
  name: "steward-1"
  dna:
    environment: "production"
    location: "us-east"
    role: "application-server"
    custom_tags:
      department: "finance"
      criticality: "high"

# Network settings
network:
  # Primary controller communication
  controller_addr: "controller.example.com:8443"
  
  # Optional outpost configuration
  outpost_enabled: false
  outpost_addr: "outpost.example.com:8443"
  
  # Metrics endpoint
  metrics_addr: ":9090"

# Security settings
security:
  cert_file: "/etc/cfgms/steward-cert.pem"
  key_file: "/etc/cfgms/steward-key.pem"
  ca_file: "/etc/cfgms/ca.pem"
  min_tls_version: "1.2"

# Connection settings
connection:
  heartbeat_interval: "30s"
  reconnect_timeout: "5s"
  max_retry_attempts: 5
  retry_backoff: "1m"

# Failover configuration
failover:
  enabled: true
  retry_interval: "1m"
  max_retries: 5
  fallback_mode: "cache"  # Options: cache, minimal, offline

# Module settings
modules:
  load_path: "/etc/cfgms/modules"
  auto_update: true
  update_interval: "1h"
  allowed_types:
    - "file"
    - "service"
    - "user"
    - "package"

# Cache settings
cache:
  enabled: true
  path: "/var/cache/cfgms"
  max_size: "1GB"
  ttl: "24h"

# Monitoring configuration
monitoring:
  health_check_interval: "30s"
  metrics_enabled: true
  log_format: "json"
  max_log_size: "100MB"
  max_log_files: 10

# Resource limits
limits:
  max_concurrent_tasks: 10
  max_module_memory: "256MB"
  request_timeout: "30s"
