# Controller Configuration Example
# Version: 1.0
# Last Updated: 2024-04-11

# System-wide settings
global:
  log_level: info
  data_dir: /var/lib/cfgms
  version: "1.0"

# Network settings
network:
  listen_addr: ":8443"
  api_addr: ":8444"
  metrics_addr: ":9090"

# Security settings
security:
  cert_file: "/etc/cfgms/cert.pem"
  key_file: "/etc/cfgms/key.pem"
  ca_file: "/etc/cfgms/ca.pem"
  min_tls_version: "1.2"
  cipher_suites:
    - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256

# Storage configuration
storage:
  type: "git"  # Options: git, postgres
  git:
    repo_url: "https://github.com/example/cfgms-config.git"
    branch: "main"
    auth_type: "ssh_key"  # Options: ssh_key, token
    ssh_key_path: "/etc/cfgms/git/id_rsa"
  cache:
    type: "memory"  # Options: memory, redis
    ttl: "5m"

# High availability settings
ha:
  enabled: true
  leader_election:
    enabled: true
    lease_duration: "15s"
    renew_deadline: "10s"
    retry_period: "2s"

# Monitoring configuration
monitoring:
  health_check_interval: "30s"
  metrics_enabled: true
  tracing_enabled: true
  log_format: "json"

# Resource limits
limits:
  max_stewards: 10000
  max_workflows: 1000
  max_concurrent_workflows: 100
  request_timeout: "30s"
