# Tenant Hierarchy Example
# Version: 1.0
# Last Updated: 2024-04-20

# This example demonstrates how tenant hierarchies are structured
# and how configurations are inherited across tenants

# Root tenant (MSP)
root:
  id: "msp-root"
  name: "MSP Root"
  description: "Root tenant for the MSP"
  settings:
    system:
      timezone: "UTC"
      locale: "en_US.UTF-8"
    security:
      password_policy:
        min_length: 12
        require_special: true
        require_numbers: true
        require_uppercase: true
        require_lowercase: true
        max_age_days: 90
    monitoring:
      health_check:
        interval: 60s
      alert_channels:
        - type: "email"
          address: "msp-alerts@example.com"

# Client tenant
client:
  id: "client-acme"
  name: "Acme Corporation"
  parent: "msp-root"
  description: "Acme Corporation client tenant"
  settings:
    system:
      timezone: "America/New_York"
    security:
      password_policy:
        min_length: 10
        max_age_days: 60
    monitoring:
      alert_channels:
        - type: "slack"
          channel: "#acme-alerts"

# Department tenant
department:
  id: "dept-it"
  name: "IT Department"
  parent: "client-acme"
  description: "IT Department of Acme Corporation"
  settings:
    security:
      ssh:
        allowed_users:
          - "it-admin"
          - "it-support"
    monitoring:
      alert_channels:
        - type: "pagerduty"
          service_key: "${PAGERDUTY_IT_KEY}"

# Project tenant
project:
  id: "proj-ecommerce"
  name: "E-commerce Project"
  parent: "dept-it"
  description: "E-commerce project for Acme Corporation"
  settings:
    monitoring:
      health_check:
        interval: 30s
      alert_channels:
        - type: "slack"
          channel: "#ecommerce-alerts"
    backup:
      schedule: "0 */2 * * *"  # Every 2 hours
      retention: "14d" 