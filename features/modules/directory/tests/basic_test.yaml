name: Basic Directory Operations
description: Tests basic directory creation and management
tests:
  - name: Create directory with default permissions
    config:
      path: /tmp/test-dir-1
      permissions: 0755
    expected:
      path: /tmp/test-dir-1
      permissions: 0755
      exists: true
      is_dir: true

  - name: Create directory with custom permissions
    config:
      path: /tmp/test-dir-2
      permissions: 0700
    expected:
      path: /tmp/test-dir-2
      permissions: 0700
      exists: true
      is_dir: true

  - name: Create directory with ownership
    config:
      path: /tmp/test-dir-3
      permissions: 0750
      owner: $CURRENT_USER
      group: $CURRENT_GROUP
    expected:
      path: /tmp/test-dir-3
      permissions: 0750
      exists: true
      is_dir: true
      owner: $CURRENT_USER
      group: $CURRENT_GROUP

  - name: Create recursive directory
    config:
      path: /tmp/test-dir-4/subdir
      permissions: 0755
      recursive: true
    expected:
      path: /tmp/test-dir-4/subdir
      permissions: 0755
      exists: true
      is_dir: true 