  - CIS
  - NIST
  - SOC2

security_level: high

tested_platforms:
  - linux-ubuntu-20.04
  - linux-ubuntu-22.04
  - linux-debian-11
  - linux-debian-12
  - linux-centos-8
  - linux-rhel-8
  - linux-rhel-9

min_version: "0.6.0"

required_modules:
  - file

required_features:
  - templates
  - dna

dependencies: []

template_file: template.yaml
readme_file: README.md

