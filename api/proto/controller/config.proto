syntax = "proto3";

package cfgms.api.controller;

option go_package = "github.com/cfgis/cfgms/api/proto/controller";

import "common/common.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

message ConfigRequest {
  string steward_id = 1;
  repeated string modules = 2;
}

message ConfigResponse {
  common.Status status = 1;
  SignedConfig config = 2;  // Protobuf configuration with embedded signature
  string version = 3;
}

message ConfigStatusReport {
  string steward_id = 1;
  string config_version = 2;
  common.Status status = 3;
  repeated ModuleStatus modules = 4;
}

message ModuleStatus {
  string name = 1;
  common.Status status = 2;
  string message = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message ConfigValidationRequest {
  bytes config = 1;  // JSON encoded configuration
  string version = 2;
}

message ConfigValidationResponse {
  common.Status status = 1;
  repeated ValidationError errors = 2;
  map<string, string> metadata = 3;
}

message ValidationError {
  enum Level {
    INFO = 0;
    WARNING = 1;
    ERROR = 2;
    CRITICAL = 3;
  }
  
  string field = 1;
  string message = 2;
  Level level = 3;
  string code = 4;
  string suggestion = 5;
}

message ConfigStreamRequest {
  string steward_id = 1;
  repeated string modules = 2;
}

message ConfigurationUpdate {
  string steward_id = 1;
  bytes config = 2;  // JSON encoded configuration
  string version = 3;
  google.protobuf.Timestamp timestamp = 4;
  enum UpdateType {
    UNKNOWN = 0;
    INITIAL = 1;
    UPDATE = 2;
    DELETE = 3;
  }
  UpdateType update_type = 5;
}

// StewardConfig represents the complete steward configuration
message StewardConfig {
  StewardSettings steward = 1;
  repeated ResourceConfig resources = 2;
  map<string, string> modules = 3;
}

// StewardSettings contains steward-specific configuration
message StewardSettings {
  string id = 1;
  string mode = 2;
  repeated string module_paths = 3;
  LoggingConfig logging = 4;
  ErrorHandlingConfig error_handling = 5;
}

// LoggingConfig defines logging output settings
message LoggingConfig {
  string level = 1;
  string format = 2;
}

// ErrorHandlingConfig defines error handling strategies
message ErrorHandlingConfig {
  string module_load_failure = 1;
  string resource_failure = 2;
  string configuration_error = 3;
}

// ResourceConfig defines a single resource to be managed
message ResourceConfig {
  string name = 1;
  string module = 2;
  google.protobuf.Struct config = 3;  // Dynamic configuration map
}

// ConfigSignature contains cryptographic signature information
message ConfigSignature {
  string algorithm = 1;
  string signature = 2;
  int64 timestamp = 3;
  string key_fingerprint = 4;
}

// SignedConfig wraps configuration with embedded signature
message SignedConfig {
  StewardConfig config = 1;
  ConfigSignature signature = 2;
}
