syntax = "proto3";

package cfgms.transport;

option go_package = "github.com/cfgis/cfgms/api/proto/transport";

import "google/protobuf/timestamp.proto";
import "transport/control.proto";

// TransferType enumerates the categories of bulk data transferred between components.
enum TransferType {
  TRANSFER_TYPE_UNSPECIFIED = 0;
  TRANSFER_TYPE_PACKAGE = 1;
  TRANSFER_TYPE_SCRIPT = 2;
  TRANSFER_TYPE_LOG_BATCH = 3;
  TRANSFER_TYPE_BINARY = 4;
}

// TaskMessageType enumerates the lifecycle events for task execution streams.
enum TaskMessageType {
  TASK_MESSAGE_TYPE_UNSPECIFIED = 0;
  TASK_MESSAGE_TYPE_START = 1;
  TASK_MESSAGE_TYPE_PROGRESS = 2;
  TASK_MESSAGE_TYPE_OUTPUT = 3;
  TASK_MESSAGE_TYPE_COMPLETE = 4;
  TASK_MESSAGE_TYPE_CANCEL = 5;
}

// === Config Sync ===

message ConfigSyncRequest {
  string steward_id = 1;
  string current_version = 2;  // steward's current config version (for delta)
  repeated string modules = 3; // optional: specific modules to sync
}

message ConfigChunk {
  bytes data = 1;              // chunk of signed config data
  int32 chunk_index = 2;
  int32 total_chunks = 3;
  string version = 4;
  string config_id = 5;
}

// === DNA Sync ===

message DNAChunk {
  string steward_id = 1;
  string tenant_id = 2;
  bytes data = 3;              // chunk of DNA data
  int32 chunk_index = 4;
  int32 total_chunks = 5;
  bool is_delta = 6;           // true = delta update, false = full snapshot
  string dna_hash = 7;
}

message DNASyncResponse {
  bool accepted = 1;
  string message = 2;
  string new_hash = 3;         // controller's computed hash after applying
}

// === Bulk Transfer ===

message BulkChunk {
  string transfer_id = 1;
  TransferType transfer_type = 2;
  bytes data = 3;
  int64 offset = 4;
  int64 total_size = 5;
  bool is_last = 6;
  map<string, string> metadata = 7;
}

// === Interactive (future) ===

message TaskMessage {
  string task_id = 1;
  TaskMessageType type = 2;
  bytes payload = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message TerminalData {
  string session_id = 1;
  bytes data = 2;              // raw terminal I/O
  bool is_resize = 3;
  int32 rows = 4;
  int32 cols = 5;
}

message LogEntry {
  string steward_id = 1;
  Severity level = 2;          // reuses Severity from control.proto (same package)
  string message = 3;
  google.protobuf.Timestamp timestamp = 4;
  map<string, string> fields = 5;
}

message LogStreamResponse {
  int64 entries_received = 1;
  bool acknowledged = 2;
}
