syntax = "proto3";

package cfgms.transport;

option go_package = "github.com/cfgis/cfgms/api/proto/transport";

import "google/protobuf/timestamp.proto";

// ControlMessage is the envelope for all C2 traffic on the ControlChannel stream.
message ControlMessage {
  oneof payload {
    Command command = 1;
    Event event = 2;
    Heartbeat heartbeat = 3;
    Response response = 4;
  }
}

// Command is sent from controller to steward via ControlChannel.
message Command {
  string id = 1;
  string type = 2;          // sync_config, sync_dna, connect_dataplane, execute_task, shutdown, validate_config
  string steward_id = 3;
  string tenant_id = 4;
  google.protobuf.Timestamp timestamp = 5;
  map<string, string> params = 6;
  int32 priority = 7;
}

// Event is sent from steward to controller via ControlChannel.
message Event {
  string id = 1;
  string type = 2;          // config_applied, dna_synced, task_completed, task_failed, error, etc.
  string steward_id = 3;
  string tenant_id = 4;
  google.protobuf.Timestamp timestamp = 5;
  string command_id = 6;    // correlation to originating command
  map<string, string> details = 7;
  string severity = 8;      // info, warning, error, critical
}

// Heartbeat is sent from steward to controller via ControlChannel.
message Heartbeat {
  string steward_id = 1;
  string tenant_id = 2;
  string status = 3;        // healthy, degraded, error, disconnected
  google.protobuf.Timestamp timestamp = 4;
  map<string, string> metrics = 5;
  string version = 6;
  string dna_hash = 7;      // for hash-based sync detection
}

// Response is sent from steward to controller for command acknowledgment.
message Response {
  string command_id = 1;
  string steward_id = 2;
  bool success = 3;
  string message = 4;
  google.protobuf.Timestamp timestamp = 5;
  map<string, string> details = 6;
}
