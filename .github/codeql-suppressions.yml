# CodeQL Alert Suppressions
# 
# These are false positives where we have proper validation in place
# but CodeQL's taint tracking is too conservative to recognize it.

suppressions:
  # Log injection false positives - stewardIDForLog/tenantIDForLog are validated
  # via regex (identifierRegex) which only allows [a-zA-Z0-9_-]+ characters.
  # This prevents injection but CodeQL's taint tracking doesn't recognize it.
  - alert-id: go/log-injection
    paths:
      - features/controller/api/handlers_stewards.go
      - features/controller/service/config_service.go
    justification: |
      All logged IDs are validated via regex pattern ^[a-zA-Z0-9_-]+$
      which prevents log injection. Variables stewardIDForLog and 
      tenantIDForLog contain either validated IDs or safe placeholder
      strings like "[INVALID_ID]".
