name: "CFGMS CodeQL config"

# Use security-extended query suite. The local data-extension pack
# (.github/codeql/extensions) is loaded by the workflow itself via the
# `init` action's `packs:` input — the config-file `packs:` field rejects
# local paths as "invalid pack specifications" (CodeQL CLI 2.25.x), but the
# workflow-level input resolves `./` paths against the runner workspace.
queries:
  - uses: security-extended
