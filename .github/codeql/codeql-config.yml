name: "CFGMS CodeQL config"

# Use security-extended query suite + CFGMS data-extension pack from ghcr.io.
# The pack (cfg-is/cfgms-go-extensions) registers sanitizer models for
# safeJoin, SanitizeLogValue, and RedactedID. It is published to the CodeQL
# pack registry by the "Publish CodeQL extension pack" step in
# .github/workflows/codeql-analysis.yml — local-path references in `packs:`
# are not supported by the codeql-action.
queries:
  - uses: security-extended

packs:
  go:
    - cfg-is/cfgms-go-extensions
