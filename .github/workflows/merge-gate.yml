name: Merge Gate

# CRITICAL: This workflow acts as a merge gate for branch protection
# It validates that all other CI checks that RAN have PASSED
# This allows path-filtered workflows to skip without blocking merge
# while ensuring any check that does run must succeed

# TRIGGER STRATEGY: Uses workflow_run to only execute AFTER critical workflows complete
# This prevents premature failures while tests are still running

on:
  # Trigger after critical workflows complete
  workflow_run:
    workflows:
      - "Test Suite Validation"
      - "Cross-Platform Build Validation"
      - "Security Scanning Workflow"
      - "CodeQL Security Analysis"
    types:
      - completed
    branches:
      - '**'  # All branches (for PRs)

  # Also allow manual trigger for debugging
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to validate'
        required: false
        type: string

permissions:
  contents: read
  checks: read
  pull-requests: read

jobs:
  merge-gate:
    name: Merge Gate Validation
    runs-on: ubuntu-latest

    steps:
      - name: Get PR information
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            let sha, prNumber;

            // Handle workflow_run trigger (most common)
            if (context.eventName === 'workflow_run') {
              sha = context.payload.workflow_run.head_sha;

              // Find PR associated with this commit
              const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: sha
              });

              if (prs.length === 0) {
                console.log('⚠️  No PR found for this commit - skipping validation');
                core.setOutput('skip', 'true');
                return;
              }

              prNumber = prs[0].number;
              console.log(`📋 Found PR #${prNumber} for commit ${sha.substring(0, 7)}`);
            }
            // Handle manual workflow_dispatch trigger
            else if (context.eventName === 'workflow_dispatch' && context.payload.inputs.pr_number) {
              prNumber = context.payload.inputs.pr_number;
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: parseInt(prNumber)
              });
              sha = pr.head.sha;
              console.log(`📋 Manual validation for PR #${prNumber}`);
            }
            else {
              console.log('⚠️  Unexpected event type - skipping');
              core.setOutput('skip', 'true');
              return;
            }

            core.setOutput('sha', sha);
            core.setOutput('pr_number', prNumber);
            core.setOutput('skip', 'false');

      - name: Validate all CI checks
        id: validate-checks
        if: steps.pr-info.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = '${{ steps.pr-info.outputs.sha }}';
            const prNumber = '${{ steps.pr-info.outputs.pr_number }}';

            console.log(`🔍 Checking CI status for commit: ${sha.substring(0, 7)}`);
            console.log(`📋 PR #${prNumber}`);

            // Get all check runs for this commit
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: sha,
              per_page: 100
            });

            console.log(`\n📊 Found ${checkRuns.check_runs.length} total checks`);

            // Filter out this workflow (merge-gate) from validation
            const otherChecks = checkRuns.check_runs.filter(check =>
              check.name !== 'Merge Gate Validation'
            );

            console.log(`\n✅ Validating ${otherChecks.length} checks (excluding merge-gate):\n`);

            let hasFailures = false;
            let hasPending = false;
            const failures = [];
            const pending = [];
            const successes = [];
            const skipped = [];

            for (const check of otherChecks) {
              const status = check.status;
              const conclusion = check.conclusion;
              const name = check.name;

              // Check is still running
              if (status !== 'completed') {
                hasPending = true;
                pending.push(name);
                console.log(`⏳ ${name}: ${status}`);
                continue;
              }

              // Check completed - evaluate conclusion
              switch (conclusion) {
                case 'success':
                  successes.push(name);
                  console.log(`✅ ${name}: success`);
                  break;
                case 'skipped':
                case 'neutral':
                  skipped.push(name);
                  console.log(`⏭️  ${name}: ${conclusion}`);
                  break;
                case 'failure':
                case 'timed_out':
                case 'action_required':
                  hasFailures = true;
                  failures.push(name);
                  console.log(`❌ ${name}: ${conclusion}`);
                  break;
                case 'cancelled':
                  // Don't block on cancelled checks
                  console.log(`⚠️  ${name}: cancelled (ignored)`);
                  break;
                default:
                  console.log(`❓ ${name}: ${conclusion} (unknown)`);
              }
            }

            // Summary
            console.log(`\n📈 Check Summary:`);
            console.log(`   ✅ Passed: ${successes.length}`);
            console.log(`   ⏭️  Skipped: ${skipped.length}`);
            console.log(`   ⏳ Pending: ${pending.length}`);
            console.log(`   ❌ Failed: ${failures.length}`);

            // Decision logic
            if (hasPending) {
              console.log(`\n⏳ Some checks are still pending:`);
              pending.forEach(name => console.log(`   - ${name}`));
              console.log(`\n⏰ Waiting for all checks to complete...`);
              core.setFailed('Waiting for other checks to complete');
              return;
            }

            if (hasFailures) {
              console.log(`\n❌ MERGE GATE FAILED - The following checks failed:`);
              failures.forEach(name => console.log(`   - ${name}`));
              console.log(`\n⛔ Cannot merge until all checks pass`);
              core.setFailed('One or more CI checks failed');
              return;
            }

            console.log(`\n✅ MERGE GATE PASSED`);
            console.log(`   All checks that ran have succeeded or were skipped`);
            console.log(`   ✓ Safe to merge`);

      - name: Post status summary
        if: always() && steps.pr-info.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.pr-info.outputs.pr_number }}';
            const conclusion = '${{ steps.validate-checks.conclusion }}';

            console.log(`\n📊 Merge Gate Summary for PR #${prNumber}:`);
            console.log(`   Status: ${conclusion}`);
            console.log(`   Triggered by: ${context.payload.workflow_run?.name || 'manual dispatch'}`);

            if (conclusion === 'failure') {
              console.log(`\n⚠️  This PR cannot be merged until all checks pass`);
              console.log(`   The merge gate will automatically re-run when you push new commits`);
            }
