# CodeQL Security Analysis Workflow
# GitHub's industry-leading SAST (Static Application Security Testing)
#
# This workflow will activate when the repository becomes public, providing
# premium CodeQL scanning capabilities at no cost for open-source projects.
#
# CodeQL catches security issues that gosec may miss, including:
# - SQL injection vulnerabilities
# - Command injection flaws
# - Path traversal issues
# - Cross-site scripting (XSS)
# - Insecure cryptography usage
# - Authentication/authorization bypasses
#
# Documentation: https://codeql.github.com/docs/

name: CodeQL Security Analysis

on:
  # Trigger only on changes to Go sources or the module graph (Issue #1581).
  # CodeQL is configured for `language: go` only, so PRs that don't touch any
  # Go files have nothing to analyze. The strict allowlist supersedes the
  # previous `paths-ignore` block — same behavior, fewer surprises for readers.
  # CodeQL config + extension pack + workflow file are also included so config
  # tweaks (sanitizer models, query suite changes) trigger a re-scan; without
  # this, a config-only commit silently ran against the previous SARIF.
  push:
    branches: [ main, develop ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/codeql/**'
      - '.github/workflows/codeql-analysis.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/codeql/**'
      - '.github/workflows/codeql-analysis.yml'
  schedule:
    # Run weekly security scan on Wednesdays at 3 AM UTC
    - cron: '0 3 * * 3'
  workflow_dispatch:

env:
  GO_VERSION: '1.26.3'

permissions: {}

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # Required for uploading CodeQL results to GitHub Security tab
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'go' ]
        # CodeQL supports: 'cpp', 'csharp', 'go', 'java', 'javascript', 'python', 'ruby'

    steps:
    - name: Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true  # explicit default — module cache handled here, no separate actions/cache step needed

    # Cache the CodeQL database between runs (Issue #1581). Keyed on a digest
    # of all Go sources + go.sum so a real code change invalidates the cache
    # and forces a fresh DB build. PRs that re-trigger CodeQL after a rebase
    # or a non-Go change in the same series get a fast restore + analyze.
    # Cache scope: the CodeQL action stores its DB under runner.temp by default.
    - name: Cache CodeQL database
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ${{ runner.temp }}/codeql_databases
        key: ${{ runner.os }}-codeql-db-${{ matrix.language }}-${{ hashFiles('**/*.go', '**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-codeql-db-${{ matrix.language }}-

    - name: Download dependencies
      run: go mod download

    # Initialize CodeQL tools for scanning.
    #
    # Pack resolution for the local extension pack (cfgis/cfgms-go-extensions):
    # we pass `--additional-packs` through to the CLI via the codeql-action's
    # documented CODEQL_ACTION_EXTRA_OPTIONS env-var hook. The action's
    # `packs:` input (config-file and workflow-level) accepts only registry
    # pack names — a local-path entry there logs "Invalid pack specification"
    # and the CLI then 404s on ghcr.io. Pre-staging the pack into
    # ~/.codeql/packages/ doesn't help either: the CLI still queries the
    # registry first for resolution unless told otherwise. --additional-packs
    # adds the workspace dir to the resolver search path, which IS honored.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
      env:
        CODEQL_ACTION_EXTRA_OPTIONS: '{"database":{"init":["--additional-packs","${{ github.workspace }}/.github/codeql"]}}'
      with:
        languages: ${{ matrix.language }}
        # Pull queries (security-extended) AND data-extension pack (by name,
        # resolved via --additional-packs above) from the repo-local config.
        config-file: ./.github/codeql/codeql-config.yml
        # Persist per-language dependency caches across runs (Issue #1581).
        # Official CodeQL-action support — complements the Go module cache
        # above and the DB cache below to minimize cold-start work.
        dependency-caching: true
        db-location: ${{ runner.temp }}/codeql_databases
        # Enable automatic language detection


    # Build the Go code for CodeQL to analyze
    # CodeQL needs to trace the build to understand code flow
    - name: Build project
      run: |
        echo "🔨 Building CFGMS for CodeQL analysis..."
        # Build all binaries to ensure complete code coverage
        make build
        echo "✅ Build complete"

    # Perform CodeQL Analysis
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
      with:
        category: "/language:${{ matrix.language }}"
        # Upload results to GitHub Security tab (SARIF format)
        upload: true
        # Generate human-readable output in addition to SARIF
        output: sarif-results
        # Configure analysis to fail on high-severity issues
        # (disabled for initial setup - enable after baseline cleanup)
        # fail-on: high

    - name: Upload CodeQL Results
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      if: always()
      with:
        name: codeql-results-${{ matrix.language }}
        path: sarif-results
        retention-days: 30

    - name: Analysis Summary
      if: always()
      run: |
        echo "## CodeQL Analysis Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Language:** ${{ matrix.language }}" >> $GITHUB_STEP_SUMMARY
        echo "**Query Suite:** security-extended" >> $GITHUB_STEP_SUMMARY
        echo "**Status:** Analysis complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Results" >> $GITHUB_STEP_SUMMARY
        echo "View detailed findings in the [Security tab](../../security/code-scanning)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Coverage" >> $GITHUB_STEP_SUMMARY
        echo "CodeQL analyzed:" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ All Go source files" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Data flow and control flow" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Security vulnerabilities" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Code quality issues" >> $GITHUB_STEP_SUMMARY
