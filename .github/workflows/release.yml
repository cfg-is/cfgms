# Release Workflow with SBOM Generation
# Automated release process for CFGMS
#
# This workflow:
# - Creates GitHub releases
# - Builds cross-platform binaries
# - Generates Software Bill of Materials (SBOM)
# - Uploads release artifacts
#
# Triggers on version tags (e.g., v0.8.0, v1.0.0)
#
# Documentation: https://github.com/anchore/sbom-action

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.8.0)'
        required: true
        type: string

env:
  GO_VERSION: '1.25.9'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # Create GitHub Release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0

    - name: Get version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=${GITHUB_REF#refs/tags/}
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Release version: $VERSION"

    - name: Generate changelog
      id: changelog
      run: |
        # Extract changelog for this version from docs
        # If CHANGELOG.md exists, extract relevant section
        if [ -f CHANGELOG.md ]; then
          # Extract section for this version
          CHANGELOG=$(awk "/## \[${{ steps.get_version.outputs.version }}\]/,/## \[/" CHANGELOG.md | head -n -1)
        else
          # Generate from git commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --abbrev-commit)
          else
            CHANGELOG=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --abbrev-commit)
          fi
        fi

        # Save to file for release notes
        echo "$CHANGELOG" > release-notes.md

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"

        # Determine if this is a prerelease
        PRERELEASE_FLAG=""
        if [[ "$VERSION" == *"-rc"* ]] || [[ "$VERSION" == *"-beta"* ]] || [[ "$VERSION" == *"-alpha"* ]]; then
          PRERELEASE_FLAG="--prerelease"
        fi

        # Create release using gh CLI
        gh release create "$VERSION" \
          --title "CFGMS $VERSION" \
          --notes-file release-notes.md \
          $PRERELEASE_FLAG

  # Build cross-platform binaries
  build-binaries:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: create-release
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          # Windows ARM64 support is limited
          - os: windows
            arch: arm64
    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Build binaries
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
        VERSION: ${{ needs.create-release.outputs.version }}
      run: |
        echo "Building for $GOOS/$GOARCH..."

        # Set binary extension for Windows
        EXT=""
        if [ "$GOOS" == "windows" ]; then
          EXT=".exe"
        fi

        # Build controller
        CGO_ENABLED=0 go build \
          -ldflags "-X github.com/cfgis/cfgms/pkg/version.Version=$VERSION -s -w" \
          -o "cfgms-controller-$VERSION-$GOOS-$GOARCH$EXT" \
          ./cmd/controller

        # Build steward
        CGO_ENABLED=0 go build \
          -ldflags "-X github.com/cfgis/cfgms/pkg/version.Version=$VERSION -s -w" \
          -o "cfgms-steward-$VERSION-$GOOS-$GOARCH$EXT" \
          ./cmd/steward

        # Build CLI
        CGO_ENABLED=0 go build \
          -ldflags "-X github.com/cfgis/cfgms/pkg/version.Version=$VERSION -s -w" \
          -o "cfgms-cli-$VERSION-$GOOS-$GOARCH$EXT" \
          ./cmd/cfg

        # Create checksums
        sha256sum cfgms-*-$GOOS-$GOARCH$EXT > "checksums-$GOOS-$GOARCH.txt"

    - name: Upload binaries and checksums to release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ needs.create-release.outputs.version }}"
        OS="${{ matrix.os }}"
        ARCH="${{ matrix.arch }}"

        # Set binary extension for Windows
        EXT=""
        if [ "$OS" == "windows" ]; then
          EXT=".exe"
        fi

        # Upload all binaries and checksums for this platform
        gh release upload "$VERSION" \
          "cfgms-controller-$VERSION-$OS-$ARCH$EXT" \
          "cfgms-steward-$VERSION-$OS-$ARCH$EXT" \
          "cfgms-cli-$VERSION-$OS-$ARCH$EXT" \
          "checksums-$OS-$ARCH.txt"

  # Generate SBOM (Software Bill of Materials)
  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: create-release
    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version: ${{ env.GO_VERSION }}

    # Generate SBOM using Syft (Anchore)
    # Using v0.20.11 (latest as of 2024-12-09) with Syft v1.38.2
    - name: Generate SBOM for Controller
      uses: anchore/sbom-action@43a17d6e7add2b5535efe4dcae9952337c479a93 # v0.20.11
      with:
        path: ./cmd/controller
        artifact-name: sbom-controller-${{ needs.create-release.outputs.version }}.spdx.json
        output-file: sbom-controller.spdx.json
        format: spdx-json

    - name: Generate SBOM for Steward
      uses: anchore/sbom-action@43a17d6e7add2b5535efe4dcae9952337c479a93 # v0.20.11
      with:
        path: ./cmd/steward
        artifact-name: sbom-steward-${{ needs.create-release.outputs.version }}.spdx.json
        output-file: sbom-steward.spdx.json
        format: spdx-json

    - name: Generate SBOM for CLI
      uses: anchore/sbom-action@43a17d6e7add2b5535efe4dcae9952337c479a93 # v0.20.11
      with:
        path: ./cmd/cfg
        artifact-name: sbom-cli-${{ needs.create-release.outputs.version }}.spdx.json
        output-file: sbom-cli.spdx.json
        format: spdx-json

    # Upload SBOMs to release
    - name: Upload SBOMs to release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ needs.create-release.outputs.version }}"

        # Upload all SBOM files
        gh release upload "$VERSION" \
          sbom-controller.spdx.json#sbom-controller-$VERSION.spdx.json \
          sbom-steward.spdx.json#sbom-steward-$VERSION.spdx.json \
          sbom-cli.spdx.json#sbom-cli-$VERSION.spdx.json

    # Generate human-readable SBOM summary
    - name: Generate SBOM Summary
      run: |
        echo "## SBOM Generation Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Software Bill of Materials (SBOM) generated for all components in SPDX-JSON format." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Files Generated" >> $GITHUB_STEP_SUMMARY
        echo "- \`sbom-controller-${{ needs.create-release.outputs.version }}.spdx.json\`" >> $GITHUB_STEP_SUMMARY
        echo "- \`sbom-steward-${{ needs.create-release.outputs.version }}.spdx.json\`" >> $GITHUB_STEP_SUMMARY
        echo "- \`sbom-cli-${{ needs.create-release.outputs.version }}.spdx.json\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### SBOM Standard" >> $GITHUB_STEP_SUMMARY
        echo "- **Format:** SPDX 2.3 (JSON)" >> $GITHUB_STEP_SUMMARY
        echo "- **Tool:** Syft (Anchore)" >> $GITHUB_STEP_SUMMARY
        echo "- **Compliance:** NTIA Minimum Elements" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Use Cases" >> $GITHUB_STEP_SUMMARY
        echo "- Supply chain security analysis" >> $GITHUB_STEP_SUMMARY
        echo "- Vulnerability tracking" >> $GITHUB_STEP_SUMMARY
        echo "- License compliance verification" >> $GITHUB_STEP_SUMMARY
        echo "- Enterprise procurement requirements" >> $GITHUB_STEP_SUMMARY

  # Back-merge release to develop
  back-merge-to-develop:
    name: Back-merge to Develop
    runs-on: ubuntu-latest
    needs: [create-release, build-binaries]
    if: success()
    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        ref: develop
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Back-merge release to develop
      run: |
        VERSION="${{ needs.create-release.outputs.version }}"

        echo "🔀 Back-merging $VERSION to develop..."

        # Configure git
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Fetch latest
        git fetch origin main develop

        # Ensure we're on develop
        git checkout develop
        git pull origin develop

        # Merge main into develop (contains the release)
        git merge origin/main --no-ff -m "Back-merge release $VERSION to develop"

        # Push to develop
        git push origin develop

        echo "✅ Successfully back-merged $VERSION to develop"

    - name: Cleanup release branch
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ needs.create-release.outputs.version }}"
        RELEASE_BRANCH="release/$VERSION"

        # Check if release branch exists
        if git ls-remote --heads origin "$RELEASE_BRANCH" | grep -q "$RELEASE_BRANCH"; then
          echo "🧹 Cleaning up release branch: $RELEASE_BRANCH"
          git push origin --delete "$RELEASE_BRANCH" || true
          echo "✅ Release branch deleted"
        else
          echo "ℹ️  Release branch $RELEASE_BRANCH not found (may have been deleted)"
        fi

  # Release summary
  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [create-release, build-binaries, generate-sbom, back-merge-to-develop]
    if: always()
    steps:
    - name: Generate Release Summary
      run: |
        echo "## Release ${{ needs.create-release.outputs.version }} Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Build Status" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Binaries | ${{ needs.build-binaries.result == 'success' && '✅ Built' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| SBOM | ${{ needs.generate-sbom.result == 'success' && '✅ Generated' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Back-merge | ${{ needs.back-merge-to-develop.result == 'success' && '✅ Completed' || '⚠️ Check manually' }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Platforms" >> $GITHUB_STEP_SUMMARY
        echo "- Linux (AMD64, ARM64)" >> $GITHUB_STEP_SUMMARY
        echo "- macOS (AMD64, ARM64)" >> $GITHUB_STEP_SUMMARY
        echo "- Windows (AMD64)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Release Assets" >> $GITHUB_STEP_SUMMARY
        echo "- Cross-platform binaries (controller, steward, CLI)" >> $GITHUB_STEP_SUMMARY
        echo "- SHA256 checksums for verification" >> $GITHUB_STEP_SUMMARY
        echo "- SBOM files (SPDX-JSON format)" >> $GITHUB_STEP_SUMMARY
