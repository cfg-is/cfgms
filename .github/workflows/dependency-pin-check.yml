# Dependency Pin Freshness Check
# Checks pinned Go security tools and binary downloads against their latest
# releases. Opens a GitHub issue if any are outdated.
#
# Dependabot handles GitHub Actions SHA pins automatically (see dependabot.yml).
# This workflow covers tools installed via `go install` and binary download
# that Dependabot cannot track.
#
# Runs weekly on Wednesday (offset from Dependabot's Monday schedule).

name: Dependency Pin Check

on:
  schedule:
    - cron: '0 9 * * 3'  # Wednesday 09:00 UTC
  workflow_dispatch:

jobs:
  check-tool-versions:
    name: Check Pinned Tool Versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
    - name: Check for outdated pinned tools
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        outdated=""
        warnings=""

        check_version() {
          local name="$1" repo="$2" pinned="$3"
          latest=$(gh api "repos/${repo}/releases/latest" --jq '.tag_name' 2>/dev/null) || latest=""
          # Fallback to tags API if releases API fails (e.g. org IP allowlists)
          if [ -z "$latest" ] || [ "$latest" = "null" ]; then
            echo "  WARN: releases API failed for ${repo}, trying tags API..."
            latest=$(gh api "repos/${repo}/tags" --jq '.[0].name' 2>/dev/null) || latest=""
          fi
          if [ -z "$latest" ] || [ "$latest" = "null" ]; then
            echo "  WARN: Could not fetch latest version for ${repo} via releases or tags API"
            warnings="${warnings}- **${name}**: could not fetch latest version from \`${repo}\` (both releases and tags API failed)\n"
            return
          fi
          if [ "$pinned" != "$latest" ]; then
            echo "  OUTDATED: ${name} pinned=${pinned} latest=${latest}"
            outdated="${outdated}- **${name}**: pinned \`${pinned}\`, latest \`${latest}\` ([releases](https://github.com/${repo}/releases))\n"
          else
            echo "  OK: ${name} ${pinned}"
          fi
        }

        echo "Checking pinned tool versions..."
        check_version "gosec"       "securego/gosec"                          "v2.25.0"
        check_version "staticcheck" "dominikh/go-tools"                       "2026.1"
        check_version "gitleaks"    "zricethezav/gitleaks"                    "v8.30.1"
        check_version "nancy"       "sonatype-nexus-community/nancy"          "v1.2.0"
        check_version "trufflehog"  "trufflesecurity/trufflehog"              "v3.94.2"
        check_version "trivy"       "aquasecurity/trivy"                      "v0.69.3"
        check_version "go-licenses" "google/go-licenses"                      "v2.0.1"
        check_version "golangci-lint" "golangci/golangci-lint"                "v2.11.4"

        if [ -z "$outdated" ] && [ -z "$warnings" ]; then
          echo ""
          echo "All pinned tools are up to date."
          exit 0
        fi

        # Build issue body sections
        body=""
        title_parts=""
        if [ -n "$outdated" ]; then
          body="${body}## Outdated Pinned Tool Versions\n\nThe following tools pinned in CI have newer releases available:\n\n${outdated}\n"
          title_parts="outdated pins"
        fi
        if [ -n "$warnings" ]; then
          body="${body}## Version Check Warnings\n\nThe following tools could not be checked — investigate why the API calls are failing:\n\n${warnings}\n"
          if [ -n "$title_parts" ]; then
            title_parts="${title_parts} + check failures"
          else
            title_parts="version check failures"
          fi
        fi
        if [ -n "$outdated" ]; then
          body="${body}### How to update\n\n1. Update the version in \`.devcontainer/Dockerfile\`, \`.github/workflows/*.yml\`, and \`Makefile\`\n2. For APT packages (trivy): update the \`=X.Y.Z\` version constraint\n3. For \`go install\`: update the \`@vX.Y.Z\` suffix\n4. For binary downloads (nancy, trufflehog): update the URL version\n5. Run the full CI suite to validate before merging\n\n"
        fi
        body="${body}### Why we pin\n\nAll tool versions are pinned to prevent supply chain attacks (see CVE-2026-33634). Never use \`@latest\`.\n\n---\n*Auto-generated by dependency-pin-check workflow*"

        echo ""
        echo "Issues found. Checking for existing issue..."

        # Check if an open issue already exists (avoid duplicates)
        existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --label "dependency-pins" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
        if [ -n "$existing" ]; then
          echo "Open issue #${existing} already exists — adding comment instead."
          printf "## Weekly Pin Check — $(date +%Y-%m-%d)\n\n${body}" \
            | gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body-file -
          exit 0
        fi

        echo "Creating issue..."
        printf "${body}" \
          | gh issue create --repo "$GITHUB_REPOSITORY" --title "deps: ${title_parts} ($(date +%Y-%m-%d))" --label "dependency-pins,dependencies,security,automated" --body-file -
