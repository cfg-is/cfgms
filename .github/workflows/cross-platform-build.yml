name: Cross-Platform Build Validation

on:
  pull_request:
    branches: [ main, develop ]
    # CONSERVATIVE: Only skip for pure documentation changes
    # Build validation runs if ANY code changes are present
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  workflow_dispatch:

env:
  GO_VERSION: '1.23'

jobs:
  # Fast cross-compilation check (single runner, all platforms)
  cross-compile-check:
    name: Cross-Platform Compilation Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-modules-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-modules-

    - name: Download dependencies
      run: go mod download

    - name: Validate Cross-Platform Compilation
      run: make build-cross-validate

    - name: Build Summary
      run: |
        echo "## Cross-Platform Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "All target platforms compile successfully:" >> $GITHUB_STEP_SUMMARY
        echo "- Linux (AMD64, ARM64)" >> $GITHUB_STEP_SUMMARY
        echo "- macOS (AMD64, ARM64)" >> $GITHUB_STEP_SUMMARY
        echo "- Windows (AMD64)" >> $GITHUB_STEP_SUMMARY

  # Native build tests on each platform
  native-builds:
    name: Native Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
          - os: macos-latest
            platform: macOS
          - os: windows-latest
            platform: Windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-modules-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-modules-

    - name: Download dependencies
      run: go mod download

    - name: Build All Binaries
      shell: bash
      run: make build

    - name: Run Unit Tests
      shell: bash
      env:
        CFGMS_TEST_INTEGRATION: "0"  # Disable integration tests (no Docker infrastructure in cross-platform CI)
      run: go test -race -short -timeout=5m ./pkg/... ./features/...

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: binaries-${{ matrix.platform }}
        path: bin/
        retention-days: 5

  # Integration tests with Docker infrastructure (Linux only)
  integration-tests:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-modules-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-modules-

    - name: Download dependencies
      run: go mod download

    - name: Start Docker Test Services
      run: |
        echo "🐳 Starting Docker test infrastructure..."
        make test-integration-setup
        echo "✅ Docker services ready"

    - name: Start Controller for Transport Tests
      run: |
        echo "🚀 Starting standalone controller for transport integration tests..."
        # Source test environment variables
        set -a
        source .env.test
        set +a
        # Start controller-standalone with HA profile (includes TimescaleDB)
        docker compose -f docker-compose.test.yml --profile ha up -d controller-standalone
        echo "⏳ Waiting for controller to be healthy..."
        sleep 30
        # Verify controller is running
        docker compose -f docker-compose.test.yml ps controller-standalone
        docker compose -f docker-compose.test.yml logs --tail=50 controller-standalone
        echo "✅ Controller started"

    - name: Run Integration Tests
      run: |
        echo "🧪 Running integration tests with Docker infrastructure..."
        # Source test environment variables from make test-integration-setup
        set -a
        source .env.test
        set +a
        export CFGMS_TEST_INTEGRATION=1

        # Run storage and controller server integration tests
        go test -race -timeout=10m ./pkg/testing/storage/... ./features/controller/server/...

        # Run transport integration tests (requires Docker controller)
        # TestRegistration includes TestSingleUseToken which is the known failing test
        go test -v -race -timeout=15m ./test/integration/transport/... -run "TestRegistration"

        # Run certificate integration tests
        go test -v -race -timeout=10m ./test/integration/... \
          -run "^Test(Certificate|ConfigValidation|Epic6Compliance|RegistrationTokenPersistence)$"

        echo "✅ Integration tests completed"

    - name: Cleanup Controller
      if: always()
      run: |
        echo "🧹 Stopping controller..."
        docker compose -f docker-compose.test.yml --profile ha down || true

    - name: Cleanup Docker Services
      if: always()
      run: make test-integration-cleanup

  # Integration gate - all platforms must succeed
  build-gate:
    name: Build Gate
    needs: [cross-compile-check, native-builds, integration-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Check Build Results
      run: |
        echo "## Build Gate Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        cross_compile="${{ needs.cross-compile-check.result }}"
        native="${{ needs.native-builds.result }}"
        integration="${{ needs.integration-tests.result }}"

        echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Cross-Compile Check | $cross_compile |" >> $GITHUB_STEP_SUMMARY
        echo "| Native Builds | $native |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration Tests | $integration |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [[ "$cross_compile" == "success" && "$native" == "success" && "$integration" == "success" ]]; then
          echo "### BUILD GATE PASSED" >> $GITHUB_STEP_SUMMARY
          echo "All platforms build and test successfully." >> $GITHUB_STEP_SUMMARY
        else
          echo "### BUILD GATE FAILED" >> $GITHUB_STEP_SUMMARY
          echo "One or more platform builds failed." >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
