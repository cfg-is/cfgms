name: Question
description: Ask a question about CFGMS usage, configuration, or architecture
title: "[Question]: "
labels: ["question", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question about CFGMS? We're here to help!

        **Note:** For general discussions or community support, consider using [GitHub Discussions](../discussions) instead.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: How do I...
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What area does your question relate to?
      options:
        - Installation & Setup
        - Configuration
        - Module Development
        - API Usage
        - Security & TLS
        - Multi-tenancy
        - Performance & Scaling
        - Integration
        - Architecture
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide any relevant context about your environment or use case.
      placeholder: |
        - What are you trying to achieve?
        - What have you already tried?
        - Any relevant configuration or setup details?
    validations:
      required: false

  - type: textarea
    id: research
    attributes:
      label: What I've Already Tried
      description: What documentation or resources have you already consulted?
      placeholder: |
        - I've read the docs at...
        - I've searched for...
        - I've tried...
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues and discussions for an answer
          required: true
        - label: I have checked the documentation
          required: true
