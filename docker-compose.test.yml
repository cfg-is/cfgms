# Docker Compose configuration for CFGMS integration testing
# Provides isolated, ephemeral test environments for storage provider validation

services:
  # PostgreSQL database for database provider testing
  postgres-test:
    image: postgres:15-alpine
    container_name: cfgms-postgres-test
    environment:
      POSTGRES_DB: cfgms_test
      POSTGRES_USER: cfgms_test
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5433:5432"  # Use non-standard port to avoid conflicts
    volumes:
      - ./test/sql:/docker-entrypoint-initdb.d:ro
      - postgres_test_data:/var/lib/postgresql/data
    tmpfs:
      # Use tmpfs for faster I/O in testing
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfgms_test -d cfgms_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cfgms-test
    profiles:
      - database  # Only start with --profile database

  # TimescaleDB database for time-series logging provider testing AND HA cluster storage
  # This service is shared between logging tests and HA integration tests
  timescaledb-test:
    image: timescale/timescaledb:latest-pg15
    container_name: cfgms-timescaledb-test
    environment:
      POSTGRES_DB: cfgms_ha_test  # Unified database for both logging and HA tests
      POSTGRES_USER: cfgms_test
      POSTGRES_PASSWORD: ${TIMESCALEDB_PASSWORD:-cfgms_test_password}
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
      # Enable TimescaleDB extension on startup
      TIMESCALEDB_TELEMETRY: "off"
    ports:
      - "5434:5432"  # Use different port from regular PostgreSQL
    volumes:
      - ./test/timescaledb:/docker-entrypoint-initdb.d:ro
      - timescaledb_test_data:/var/lib/postgresql/data
    tmpfs:
      # Use tmpfs for faster I/O in testing
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfgms_test -d cfgms_ha_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s  # Reduced from 60s for faster startup
    networks:
      - cfgms-test
    profiles:
      - timescale  # Only start with --profile timescale
      - ha  # Also start with --profile ha

  # Gitea server for git provider testing (lightweight Git server)
  git-server-test:
    image: gitea/gitea:1.21.0
    container_name: cfgms-git-server-test
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__security__SECRET_KEY=${GITEA_SECRET_KEY}
      - GITEA__security__INTERNAL_TOKEN=${GITEA_INTERNAL_TOKEN}
      - GITEA__server__DISABLE_SSH=true
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__ROOT_URL=http://localhost:3001/
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__admin__USERNAME=cfgms_test
      - GITEA__admin__PASSWORD=${GITEA_ADMIN_PASSWORD}
      - GITEA__admin__EMAIL=test@cfgms.local
    ports:
      - "3001:3000"
    volumes:
      - gitea_test_data:/data
      - ./test/git-repos:/data/git/repositories:rw
      - ./test/gitea-init:/docker-entrypoint-init.d:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - cfgms-test
    depends_on:
      - postgres-test
    profiles:
      - git  # Only start with --profile git

  # Redis for session/cache testing (future Epic support)
  redis-test:
    image: redis:7-alpine
    container_name: cfgms-redis-test
    ports:
      - "6380:6379"  # Use non-standard port
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - cfgms-test
    profiles:
      - future  # Only start with --profile future

  # ============================================================================
  # HIGH AVAILABILITY (HA) CLUSTER SERVICES
  # Used for HA integration testing (Story #178)
  # Start with: docker compose --profile ha up
  # ============================================================================

  # Controller East (us-east region)
  controller-east:
    container_name: controller-east
    build:
      context: .
      dockerfile: cmd/controller/Dockerfile
    ports:
      - "8080:8080"
      - "9080:9080"
    environment:
      CFGMS_NODE_ID: "controller-east"
      CFGMS_NODE_REGION: "us-east"
      CFGMS_LISTEN_ADDR: "0.0.0.0:8080"
      CFGMS_HTTP_LISTEN_ADDR: "0.0.0.0:9080"
      CFGMS_STORAGE_PROVIDER: "database"
      CFGMS_DB_HOST: "timescaledb-test"
      CFGMS_DB_PORT: "5432"
      CFGMS_DB_NAME: "cfgms_ha_test"
      CFGMS_DB_USER: "cfgms_test"
      CFGMS_DB_PASSWORD: "${TIMESCALEDB_PASSWORD:-cfgms_test_password}"
      CFGMS_DB_SSLMODE: "disable"
      CFGMS_LOG_LEVEL: "debug"
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
      CFGMS_TIMESCALE_HOST: "timescaledb-test"
      CFGMS_TIMESCALE_PORT: "5432"
      CFGMS_TIMESCALE_DATABASE: "cfgms_ha_test"
      CFGMS_TIMESCALE_USER: "cfgms_test"
      CFGMS_TIMESCALE_PASSWORD: "${TIMESCALEDB_PASSWORD:-cfgms_test_password}"
      CFGMS_HA_ENABLED: "true"
      CFGMS_HA_MODE: "cluster"
      CFGMS_HA_EXTERNAL_ADDRESS: "controller-east:9080"
      CFGMS_HA_CLUSTER_NODES: "controller-east:9080,controller-central:9081,controller-west:9082"
      CFGMS_HA_DISCOVERY_METHOD: "static"
      CFGMS_HA_DISCOVERY_INTERVAL: "10s"
      CFGMS_HA_NODE_TIMEOUT: "15s"
      CFGMS_HA_ELECTION_TIMEOUT: "5s"
      CFGMS_HA_HEARTBEAT_INTERVAL: "2s"
      CFGMS_API_KEY: "test-api-key-east"
    depends_on:
      timescaledb-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -ln | grep :8080"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cfgms-test
    profiles:
      - ha

  # Controller Central (us-central region)
  controller-central:
    container_name: controller-central
    build:
      context: .
      dockerfile: cmd/controller/Dockerfile
    ports:
      - "8081:8081"
      - "9081:9081"
    environment:
      CFGMS_NODE_ID: "controller-central"
      CFGMS_NODE_REGION: "us-central"
      CFGMS_LISTEN_ADDR: "0.0.0.0:8081"
      CFGMS_HTTP_LISTEN_ADDR: "0.0.0.0:9081"
      CFGMS_STORAGE_PROVIDER: "database"
      CFGMS_DB_HOST: "timescaledb-test"
      CFGMS_DB_PORT: "5432"
      CFGMS_DB_NAME: "cfgms_ha_test"
      CFGMS_DB_USER: "cfgms_test"
      CFGMS_DB_PASSWORD: "${TIMESCALEDB_PASSWORD:-cfgms_test_password}"
      CFGMS_DB_SSLMODE: "disable"
      CFGMS_LOG_LEVEL: "debug"
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
      CFGMS_TIMESCALE_HOST: "timescaledb-test"
      CFGMS_TIMESCALE_PORT: "5432"
      CFGMS_TIMESCALE_DATABASE: "cfgms_ha_test"
      CFGMS_TIMESCALE_USER: "cfgms_test"
      CFGMS_TIMESCALE_PASSWORD: "${TIMESCALEDB_PASSWORD:-cfgms_test_password}"
      CFGMS_HA_ENABLED: "true"
      CFGMS_HA_MODE: "cluster"
      CFGMS_HA_EXTERNAL_ADDRESS: "controller-central:9081"
      CFGMS_HA_CLUSTER_NODES: "controller-east:9080,controller-central:9081,controller-west:9082"
      CFGMS_HA_DISCOVERY_METHOD: "static"
      CFGMS_HA_DISCOVERY_INTERVAL: "10s"
      CFGMS_HA_NODE_TIMEOUT: "15s"
      CFGMS_HA_ELECTION_TIMEOUT: "5s"
      CFGMS_HA_HEARTBEAT_INTERVAL: "2s"
      CFGMS_API_KEY: "test-api-key-central"
    depends_on:
      timescaledb-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -ln | grep :8081"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cfgms-test
    profiles:
      - ha

  # Controller West (us-west region)
  controller-west:
    container_name: controller-west
    build:
      context: .
      dockerfile: cmd/controller/Dockerfile
    ports:
      - "8082:8082"
      - "9082:9082"
    environment:
      CFGMS_NODE_ID: "controller-west"
      CFGMS_NODE_REGION: "us-west"
      CFGMS_LISTEN_ADDR: "0.0.0.0:8082"
      CFGMS_HTTP_LISTEN_ADDR: "0.0.0.0:9082"
      CFGMS_STORAGE_PROVIDER: "database"
      CFGMS_DB_HOST: "timescaledb-test"
      CFGMS_DB_PORT: "5432"
      CFGMS_DB_NAME: "cfgms_ha_test"
      CFGMS_DB_USER: "cfgms_test"
      CFGMS_DB_PASSWORD: "${TIMESCALEDB_PASSWORD:-cfgms_test_password}"
      CFGMS_DB_SSLMODE: "disable"
      CFGMS_LOG_LEVEL: "debug"
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
      CFGMS_TIMESCALE_HOST: "timescaledb-test"
      CFGMS_TIMESCALE_PORT: "5432"
      CFGMS_TIMESCALE_DATABASE: "cfgms_ha_test"
      CFGMS_TIMESCALE_USER: "cfgms_test"
      CFGMS_TIMESCALE_PASSWORD: "${TIMESCALEDB_PASSWORD:-cfgms_test_password}"
      CFGMS_HA_ENABLED: "true"
      CFGMS_HA_MODE: "cluster"
      CFGMS_HA_EXTERNAL_ADDRESS: "controller-west:9082"
      CFGMS_HA_CLUSTER_NODES: "controller-east:9080,controller-central:9081,controller-west:9082"
      CFGMS_HA_DISCOVERY_METHOD: "static"
      CFGMS_HA_DISCOVERY_INTERVAL: "10s"
      CFGMS_HA_NODE_TIMEOUT: "15s"
      CFGMS_HA_ELECTION_TIMEOUT: "5s"
      CFGMS_HA_HEARTBEAT_INTERVAL: "2s"
      CFGMS_API_KEY: "test-api-key-west"
    depends_on:
      timescaledb-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -ln | grep :8082"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cfgms-test
    profiles:
      - ha

  # Steward East (connects to HA controller cluster)
  steward-east:
    container_name: steward-east
    build:
      context: .
      dockerfile: cmd/steward/Dockerfile
    environment:
      CFGMS_STEWARD_ID: "steward-east"
      CFGMS_STEWARD_NAME: "steward-east"
      CFGMS_CONTROLLER_URLS: "https://controller-east:9080,https://controller-central:9081,https://controller-west:9082"
      CFGMS_LOG_LEVEL: "debug"
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
      CFGMS_API_KEY: "test-api-key-east"
      CFGMS_TLS_SKIP_VERIFY: "true"
    depends_on:
      controller-east:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep steward | grep -v grep"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cfgms-test
    profiles:
      - ha

  # Steward Central (connects to HA controller cluster)
  steward-central:
    container_name: steward-central
    build:
      context: .
      dockerfile: cmd/steward/Dockerfile
    environment:
      CFGMS_STEWARD_ID: "steward-central"
      CFGMS_STEWARD_NAME: "steward-central"
      CFGMS_CONTROLLER_URLS: "https://controller-east:9080,https://controller-central:9081,https://controller-west:9082"
      CFGMS_LOG_LEVEL: "debug"
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
      CFGMS_API_KEY: "test-api-key-central"
      CFGMS_TLS_SKIP_VERIFY: "true"
    depends_on:
      controller-central:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep steward | grep -v grep"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cfgms-test
    profiles:
      - ha

  # Steward West (connects to HA controller cluster)
  steward-west:
    container_name: steward-west
    build:
      context: .
      dockerfile: cmd/steward/Dockerfile
    environment:
      CFGMS_STEWARD_ID: "steward-west"
      CFGMS_STEWARD_NAME: "steward-west"
      CFGMS_CONTROLLER_URLS: "https://controller-east:9080,https://controller-central:9081,https://controller-west:9082"
      CFGMS_LOG_LEVEL: "debug"
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
      CFGMS_API_KEY: "test-api-key-west"
      CFGMS_TLS_SKIP_VERIFY: "true"
    depends_on:
      controller-west:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep steward | grep -v grep"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cfgms-test
    profiles:
      - ha

  # Git Server for HA testing (uses TimescaleDB for storage)
  # Note: This is separate from git-server-test to avoid configuration conflicts
  git-server-ha:
    image: gitea/gitea:1.21
    container_name: cfgms-git-server-ha
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=timescaledb-test:5432
      - GITEA__database__NAME=cfgms_ha_test
      - GITEA__database__USER=cfgms_test
      - GITEA__database__PASSWD=${TIMESCALEDB_PASSWORD:-cfgms_test_password}
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__ROOT_URL=http://git-server-ha:3000
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__security__SECRET_KEY=gitea-secret-key-for-ha-testing
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__service__REQUIRE_SIGNIN_VIEW=false
    ports:
      - "3002:3000"  # Use port 3002 to avoid conflict with git-server-test on 3001
    volumes:
      - gitea_ha_data:/data
    depends_on:
      timescaledb-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/version"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cfgms-test
    profiles:
      - ha

volumes:
  postgres_test_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=512m
  timescaledb_test_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=512m
  gitea_test_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=256m
  gitea_ha_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=256m

networks:
  cfgms-test:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
    name: cfgms-test  # Explicit network name to avoid name conflicts