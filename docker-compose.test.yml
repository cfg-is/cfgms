# Docker Compose configuration for CFGMS integration testing
# Provides isolated, ephemeral test environments for storage provider validation

version: '3.8'

services:
  # PostgreSQL database for database provider testing
  postgres-test:
    image: postgres:15-alpine
    container_name: cfgms-postgres-test
    environment:
      POSTGRES_DB: cfgms_test
      POSTGRES_USER: cfgms_test
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5433:5432"  # Use non-standard port to avoid conflicts
    volumes:
      - ./test/sql:/docker-entrypoint-initdb.d:ro
      - postgres_test_data:/var/lib/postgresql/data
    tmpfs:
      # Use tmpfs for faster I/O in testing
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfgms_test -d cfgms_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cfgms-test

  # Gitea server for git provider testing (lightweight Git server)
  git-server-test:
    image: gitea/gitea:1.21-alpine
    container_name: cfgms-git-server-test
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__security__SECRET_KEY=${GITEA_SECRET_KEY}
      - GITEA__security__INTERNAL_TOKEN=${GITEA_INTERNAL_TOKEN}
      - GITEA__server__DISABLE_SSH=true
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__ROOT_URL=http://localhost:3001/
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__admin__USERNAME=cfgms_test
      - GITEA__admin__PASSWORD=${GITEA_ADMIN_PASSWORD}
      - GITEA__admin__EMAIL=test@cfgms.local
    ports:
      - "3001:3000"
    volumes:
      - gitea_test_data:/data
      - ./test/git-repos:/data/git/repositories:rw
      - ./test/gitea-init:/docker-entrypoint-init.d:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - cfgms-test
    depends_on:
      - postgres-test

  # Redis for session/cache testing (future Epic support)
  redis-test:
    image: redis:7-alpine
    container_name: cfgms-redis-test
    ports:
      - "6380:6379"  # Use non-standard port
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - cfgms-test
    profiles:
      - future  # Only start with --profile future

volumes:
  postgres_test_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=512m
  gitea_test_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=256m

networks:
  cfgms-test:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16