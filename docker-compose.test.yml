# Docker Compose configuration for CFGMS integration testing
# Provides isolated, ephemeral test environments for storage provider validation

services:
  # PostgreSQL database for database provider testing
  postgres-test:
    image: postgres:15-alpine
    container_name: cfgms-postgres-test
    environment:
      POSTGRES_DB: cfgms_test
      POSTGRES_USER: cfgms_test
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5433:5432"  # Use non-standard port to avoid conflicts
    volumes:
      - ./test/sql:/docker-entrypoint-initdb.d:ro
      - postgres_test_data:/var/lib/postgresql/data
    tmpfs:
      # Use tmpfs for faster I/O in testing
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfgms_test -d cfgms_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cfgms-test
    profiles:
      - database  # Only start with --profile database

  # TimescaleDB database for time-series logging provider testing AND HA cluster storage
  # This service is shared between logging tests and HA integration tests
  timescaledb-test:
    image: timescale/timescaledb:latest-pg15
    container_name: cfgms-timescaledb-test
    environment:
      POSTGRES_DB: cfgms_ha_test  # Unified database for both logging and HA tests
      POSTGRES_USER: cfgms_test
      POSTGRES_PASSWORD: ${TIMESCALEDB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
      # Enable TimescaleDB extension on startup
      TIMESCALEDB_TELEMETRY: "off"
    ports:
      - "5434:5432"  # Use different port from regular PostgreSQL
    volumes:
      - ./test/timescaledb:/docker-entrypoint-initdb.d:ro
      - timescaledb_test_data:/var/lib/postgresql/data
    tmpfs:
      # Use tmpfs for faster I/O in testing
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfgms_test -d cfgms_ha_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s  # Reduced from 60s for faster startup
    networks:
      - cfgms-test
    profiles:
      - timescale  # Only start with --profile timescale
      - ha  # Also start with --profile ha

  # Gitea server for git provider testing (lightweight Git server)
  git-server-test:
    image: gitea/gitea:1.21.0
    container_name: cfgms-git-server-test
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__security__SECRET_KEY=${GITEA_SECRET_KEY}
      - GITEA__security__INTERNAL_TOKEN=${GITEA_INTERNAL_TOKEN}
      - GITEA__server__DISABLE_SSH=true
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__ROOT_URL=http://localhost:3001/
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__admin__USERNAME=cfgms_test
      - GITEA__admin__PASSWORD=${GITEA_ADMIN_PASSWORD}
      - GITEA__admin__EMAIL=test@cfgms.local
    ports:
      - "3001:3000"
    volumes:
      - gitea_test_data:/data
      - ./test/git-repos:/data/git/repositories:rw
      - ./test/gitea-init:/docker-entrypoint-init.d:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - cfgms-test
    depends_on:
      - postgres-test
    profiles:
      - git  # Only start with --profile git

  # Redis for session/cache testing (future Epic support)
  redis-test:
    image: redis:7-alpine
    container_name: cfgms-redis-test
    ports:
      - "6380:6379"  # Use non-standard port
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - cfgms-test
    profiles:
      - future  # Only start with --profile future

  # ============================================================================
  # HIGH AVAILABILITY (HA) CLUSTER SERVICES
  # Used for HA integration testing (Story #178)
  # Start with: docker compose --profile ha up
  # ============================================================================

  # Controller East (us-east region) - gRPC-over-QUIC Transport (Issue #519)
  controller-east:
    container_name: controller-east
    build:
      context: .
      dockerfile: cmd/controller/Dockerfile
    ports:
      - "4433:4433/udp"   # gRPC-over-QUIC transport
      - "9080:9080"   # HTTP API
    environment:
      CFGMS_NODE_ID: "controller-east"
      CFGMS_NODE_REGION: "us-east"
      # gRPC-over-QUIC Transport (Issue #519: replaces MQTT+QUIC)
      CFGMS_TRANSPORT_LISTEN_ADDR: "0.0.0.0:4433"
      CFGMS_TRANSPORT_USE_CERT_MANAGER: "true"
      CFGMS_HTTP_LISTEN_ADDR: "0.0.0.0:9080"
      # Storage Configuration
      CFGMS_STORAGE_PROVIDER: "database"
      CFGMS_DB_HOST: "timescaledb-test"
      CFGMS_DB_PORT: "5432"
      CFGMS_DB_NAME: "cfgms_ha_test"
      CFGMS_DB_USER: "cfgms_test"
      CFGMS_DB_PASSWORD: "${TIMESCALEDB_PASSWORD}"
      CFGMS_DB_SSLMODE: "disable"
      # Logging Configuration
      CFGMS_LOG_LEVEL: "debug"
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
      CFGMS_TIMESCALE_HOST: "timescaledb-test"
      CFGMS_TIMESCALE_PORT: "5432"
      CFGMS_TIMESCALE_DATABASE: "cfgms_ha_test"
      CFGMS_TIMESCALE_USER: "cfgms_test"
      CFGMS_TIMESCALE_PASSWORD: "${TIMESCALEDB_PASSWORD}"
      # HA Configuration
      CFGMS_HA_ENABLED: "true"
      CFGMS_HA_MODE: "cluster"
      CFGMS_HA_EXTERNAL_ADDRESS: "controller-east:9080"
      CFGMS_HA_CLUSTER_NODES: "controller-east:9080,controller-central:9081,controller-west:9082"
      CFGMS_HA_DISCOVERY_METHOD: "static"
      CFGMS_HA_DISCOVERY_INTERVAL: "10s"
      CFGMS_HA_NODE_TIMEOUT: "15s"
      CFGMS_HA_ELECTION_TIMEOUT: "5s"
      CFGMS_HA_HEARTBEAT_INTERVAL: "2s"
      CFGMS_API_KEY: "${API_KEY_EAST}"
    depends_on:
      timescaledb-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -ln | grep :4433"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cfgms-test
    profiles:
      - ha

  # Controller Central (us-central region) - gRPC-over-QUIC Transport (Issue #519)
  controller-central:
    container_name: controller-central
    build:
      context: .
      dockerfile: cmd/controller/Dockerfile
    ports:
      - "4434:4433/udp"   # gRPC-over-QUIC transport (different host port)
      - "9081:9081"   # HTTP API
    environment:
      CFGMS_NODE_ID: "controller-central"
      CFGMS_NODE_REGION: "us-central"
      # gRPC-over-QUIC Transport (Issue #519: replaces MQTT+QUIC)
      CFGMS_TRANSPORT_LISTEN_ADDR: "0.0.0.0:4433"
      CFGMS_TRANSPORT_USE_CERT_MANAGER: "true"
      CFGMS_HTTP_LISTEN_ADDR: "0.0.0.0:9081"
      # Storage Configuration
      CFGMS_STORAGE_PROVIDER: "database"
      CFGMS_DB_HOST: "timescaledb-test"
      CFGMS_DB_PORT: "5432"
      CFGMS_DB_NAME: "cfgms_ha_test"
      CFGMS_DB_USER: "cfgms_test"
      CFGMS_DB_PASSWORD: "${TIMESCALEDB_PASSWORD}"
      CFGMS_DB_SSLMODE: "disable"
      # Logging Configuration
      CFGMS_LOG_LEVEL: "debug"
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
      CFGMS_TIMESCALE_HOST: "timescaledb-test"
      CFGMS_TIMESCALE_PORT: "5432"
      CFGMS_TIMESCALE_DATABASE: "cfgms_ha_test"
      CFGMS_TIMESCALE_USER: "cfgms_test"
      CFGMS_TIMESCALE_PASSWORD: "${TIMESCALEDB_PASSWORD}"
      # HA Configuration
      CFGMS_HA_ENABLED: "true"
      CFGMS_HA_MODE: "cluster"
      CFGMS_HA_EXTERNAL_ADDRESS: "controller-central:9081"
      CFGMS_HA_CLUSTER_NODES: "controller-east:9080,controller-central:9081,controller-west:9082"
      CFGMS_HA_DISCOVERY_METHOD: "static"
      CFGMS_HA_DISCOVERY_INTERVAL: "10s"
      CFGMS_HA_NODE_TIMEOUT: "15s"
      CFGMS_HA_ELECTION_TIMEOUT: "5s"
      CFGMS_HA_HEARTBEAT_INTERVAL: "2s"
      CFGMS_API_KEY: "${API_KEY_CENTRAL}"
    depends_on:
      timescaledb-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -ln | grep :4433"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cfgms-test
    profiles:
      - ha

  # Controller West (us-west region) - gRPC-over-QUIC Transport (Issue #519)
  controller-west:
    container_name: controller-west
    build:
      context: .
      dockerfile: cmd/controller/Dockerfile
    ports:
      - "4435:4433/udp"   # gRPC-over-QUIC transport (different host port)
      - "9082:9082"   # HTTP API
    environment:
      CFGMS_NODE_ID: "controller-west"
      CFGMS_NODE_REGION: "us-west"
      # gRPC-over-QUIC Transport (Issue #519: replaces MQTT+QUIC)
      CFGMS_TRANSPORT_LISTEN_ADDR: "0.0.0.0:4433"
      CFGMS_TRANSPORT_USE_CERT_MANAGER: "true"
      CFGMS_HTTP_LISTEN_ADDR: "0.0.0.0:9082"
      # Storage Configuration
      CFGMS_STORAGE_PROVIDER: "database"
      CFGMS_DB_HOST: "timescaledb-test"
      CFGMS_DB_PORT: "5432"
      CFGMS_DB_NAME: "cfgms_ha_test"
      CFGMS_DB_USER: "cfgms_test"
      CFGMS_DB_PASSWORD: "${TIMESCALEDB_PASSWORD}"
      CFGMS_DB_SSLMODE: "disable"
      # Logging Configuration
      CFGMS_LOG_LEVEL: "debug"
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
      CFGMS_TIMESCALE_HOST: "timescaledb-test"
      CFGMS_TIMESCALE_PORT: "5432"
      CFGMS_TIMESCALE_DATABASE: "cfgms_ha_test"
      CFGMS_TIMESCALE_USER: "cfgms_test"
      CFGMS_TIMESCALE_PASSWORD: "${TIMESCALEDB_PASSWORD}"
      # HA Configuration
      CFGMS_HA_ENABLED: "true"
      CFGMS_HA_MODE: "cluster"
      CFGMS_HA_EXTERNAL_ADDRESS: "controller-west:9082"
      CFGMS_HA_CLUSTER_NODES: "controller-east:9080,controller-central:9081,controller-west:9082"
      CFGMS_HA_DISCOVERY_METHOD: "static"
      CFGMS_HA_DISCOVERY_INTERVAL: "10s"
      CFGMS_HA_NODE_TIMEOUT: "15s"
      CFGMS_HA_ELECTION_TIMEOUT: "5s"
      CFGMS_HA_HEARTBEAT_INTERVAL: "2s"
      CFGMS_API_KEY: "${API_KEY_WEST}"
    depends_on:
      timescaledb-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -ln | grep :4433"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cfgms-test
    profiles:
      - ha

  # Steward East (connects to HA controller cluster) - gRPC-over-QUIC (Issue #519)
  steward-east:
    container_name: steward-east
    build:
      context: .
      dockerfile: cmd/steward/Dockerfile
      args:
        STEWARD_CONTROLLER_URL: "https://controller-east:9080"
    environment:
      # gRPC-over-QUIC Transport (Issue #519: replaces MQTT+QUIC)
      CFGMS_REGISTRATION_TOKEN: "${REG_TOKEN_EAST}"
      CFGMS_TRANSPORT_ADDRESS: "controller-east:4433"
      # Logging Configuration
      CFGMS_LOG_LEVEL: "debug"
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
    depends_on:
      controller-east:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep steward | grep -v grep"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cfgms-test
    profiles:
      - ha

  # Steward Central (connects to HA controller cluster) - gRPC-over-QUIC (Issue #519)
  steward-central:
    container_name: steward-central
    build:
      context: .
      dockerfile: cmd/steward/Dockerfile
      args:
        STEWARD_CONTROLLER_URL: "https://controller-central:9080"
    environment:
      # gRPC-over-QUIC Transport (Issue #519: replaces MQTT+QUIC)
      CFGMS_REGISTRATION_TOKEN: "${REG_TOKEN_CENTRAL}"
      CFGMS_TRANSPORT_ADDRESS: "controller-central:4433"
      # Logging Configuration
      CFGMS_LOG_LEVEL: "debug"
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
    depends_on:
      controller-central:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep steward | grep -v grep"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cfgms-test
    profiles:
      - ha

  # Steward West (connects to HA controller cluster) - gRPC-over-QUIC (Issue #519)
  steward-west:
    container_name: steward-west
    build:
      context: .
      dockerfile: cmd/steward/Dockerfile
      args:
        STEWARD_CONTROLLER_URL: "https://controller-west:9080"
    environment:
      # gRPC-over-QUIC Transport (Issue #519: replaces MQTT+QUIC)
      CFGMS_REGISTRATION_TOKEN: "${REG_TOKEN_WEST}"
      CFGMS_TRANSPORT_ADDRESS: "controller-west:4433"
      # Logging Configuration
      CFGMS_LOG_LEVEL: "debug"
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
    depends_on:
      controller-west:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep steward | grep -v grep"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cfgms-test
    profiles:
      - ha

  # Git Server for HA testing (uses TimescaleDB for storage)
  # Note: This is separate from git-server-test to avoid configuration conflicts
  git-server-ha:
    image: gitea/gitea:1.21
    container_name: cfgms-git-server-ha
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=timescaledb-test:5432
      - GITEA__database__NAME=cfgms_ha_test
      - GITEA__database__USER=cfgms_test
      - GITEA__database__PASSWD=${TIMESCALEDB_PASSWORD}
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__ROOT_URL=http://git-server-ha:3000
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__security__SECRET_KEY=${GITEA_SECRET_KEY}
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__service__REQUIRE_SIGNIN_VIEW=false
    ports:
      - "3002:3000"  # Use port 3002 to avoid conflict with git-server-test on 3001
    volumes:
      - gitea_ha_data:/data
    depends_on:
      timescaledb-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/version"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cfgms-test
    profiles:
      - ha

  # ============================================================================
  # STANDALONE CONTROLLER (Non-HA) - gRPC-over-QUIC Transport (Issue #519)
  # Used for integration testing single-controller functionality
  # Runs alongside HA cluster to validate both architectures in parallel
  # Start with: docker compose --profile ha up (included in HA profile)
  # ============================================================================

  controller-standalone:
    container_name: controller-standalone
    build:
      context: .
      dockerfile: cmd/controller/Dockerfile
    ports:
      - "4436:4433/udp"   # gRPC-over-QUIC transport (CP+DP on single port, Story #515)
      - "8080:9080"    # HTTP API (unique host port to avoid conflict with controller-east)
    environment:
      CFGMS_NODE_ID: "controller-standalone"
      CFGMS_EXTERNAL_HOSTNAME: "controller-standalone"  # Story #312: External hostname for steward connections
      # Unified gRPC-over-QUIC transport (Story #515: replaces separate MQTT+QUIC)
      CFGMS_TRANSPORT_LISTEN_ADDR: "0.0.0.0:4433"
      CFGMS_TRANSPORT_USE_CERT_MANAGER: "true"
      # HTTP API uses default port 9080 (no override needed)
      # Storage Configuration
      CFGMS_STORAGE_PROVIDER: "database"
      CFGMS_DB_HOST: "timescaledb-test"  # Share database with HA cluster
      CFGMS_DB_PORT: "5432"
      CFGMS_DB_NAME: "cfgms_ha_test"
      CFGMS_DB_USER: "cfgms_test"
      CFGMS_DB_PASSWORD: "${TIMESCALEDB_PASSWORD}"
      CFGMS_DB_SSLMODE: "disable"
      # Logging Configuration
      CFGMS_LOG_LEVEL: "debug"
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
      CFGMS_TIMESCALE_HOST: "timescaledb-test"
      CFGMS_TIMESCALE_PORT: "5432"
      CFGMS_TIMESCALE_DATABASE: "cfgms_ha_test"
      CFGMS_TIMESCALE_USER: "cfgms_test"
      CFGMS_TIMESCALE_PASSWORD: "${TIMESCALEDB_PASSWORD}"
      # Disable HA to run in standalone mode
      CFGMS_HA_ENABLED: "false"
      # Enable test endpoints for integration testing (auth bypass for /api/v1/test/*)
      CFGMS_ENABLE_TEST_ENDPOINTS: "true"
      CFGMS_CERT_PATH: "/app/certs"
      CFGMS_DATA_DIR: "/app/data"
    # Run as root to avoid permission issues, create log dir first
    user: root
    command: ["sh", "-c", "mkdir -p /tmp/cfgms && ./controller --init 2>/dev/null; exec ./controller"]
    volumes:
      - controller_standalone_certs:/app/certs  # Use volume for writable certs
      - controller_standalone_data:/app/data
    depends_on:
      timescaledb-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -ln | grep :4433"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cfgms-test
    profiles:
      - ha  # Include in HA profile to run everything together

  # ============================================================================
  # Steward - Standalone Test Instance
  # ============================================================================
  # Single steward for testing with controller-standalone
  # Used for Docker integration tests to verify real MQTT+QUIC communication
  # Start with: docker compose --profile ha up (included in HA profile)
  # ============================================================================

  steward-standalone:
    container_name: steward-standalone
    build:
      context: .
      dockerfile: cmd/steward/Dockerfile
      args:
        STEWARD_CONTROLLER_URL: "https://controller-standalone:9080"
    environment:
      CFGMS_REGISTRATION_TOKEN: "${REG_TOKEN_STANDALONE}"
      # gRPC transport uses TLS auto-negotiated via registration response (no static cert paths needed)
      CFGMS_LOG_LEVEL: "debug"
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
    command: ["sh", "-c", "./steward --log-level debug --log-provider file --regtoken $$CFGMS_REGISTRATION_TOKEN"]
    volumes:
      - steward_standalone_data:/app/data
    tmpfs:
      # Story #315: Use tmpfs for module execution test workspace (writable, fast, ephemeral)
      # Simulates real-world endpoint with writable directory, no permission issues
      # exec flag required for script execution tests
      - /test-workspace:uid=1001,gid=1001,mode=0755,exec
    depends_on:
      controller-standalone:
        condition: service_healthy
    networks:
      - cfgms-test
    profiles:
      - ha  # Include in HA profile to run with controller-standalone

  # ============================================================================
  # Multi-Tenant Stewards - Story 12.5: Multi-Tenant Isolation Testing
  # ============================================================================
  # Three tenant-specific stewards for multi-tenant isolation validation
  # Each connects to controller-standalone with unique tenant ID
  # Used to validate gRPC connection registry isolation and tenant boundary enforcement
  # Start with: docker compose --profile ha up
  # ============================================================================

  steward-tenant1:
    container_name: steward-tenant1
    build:
      context: .
      dockerfile: cmd/steward/Dockerfile
      args:
        STEWARD_CONTROLLER_URL: "https://controller-standalone:9080"
    environment:
      CFGMS_TENANT_ID: "tenant1"  # Story 12.5: Tenant isolation
      CFGMS_REGISTRATION_TOKEN: "${REG_TOKEN_TENANT1}"
      CFGMS_LOG_LEVEL: "debug"
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
    command: ["sh", "-c", "./steward --log-level debug --log-provider file --regtoken $$CFGMS_REGISTRATION_TOKEN --tenant-id tenant1"]
    volumes:
      - steward_tenant1_data:/app/data
      - ./test/module-execution:/test-workspace:rw
    depends_on:
      controller-standalone:
        condition: service_healthy
    networks:
      - cfgms-test
    profiles:
      - ha

  steward-tenant2:
    container_name: steward-tenant2
    build:
      context: .
      dockerfile: cmd/steward/Dockerfile
      args:
        STEWARD_CONTROLLER_URL: "https://controller-standalone:9080"
    environment:
      CFGMS_TENANT_ID: "tenant2"  # Story 12.5: Tenant isolation
      CFGMS_REGISTRATION_TOKEN: "${REG_TOKEN_TENANT2}"
      CFGMS_LOG_LEVEL: "debug"
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
    command: ["sh", "-c", "./steward --log-level debug --log-provider file --regtoken $$CFGMS_REGISTRATION_TOKEN --tenant-id tenant2"]
    volumes:
      - steward_tenant2_data:/app/data
      - ./test/module-execution:/test-workspace:rw
    depends_on:
      controller-standalone:
        condition: service_healthy
    networks:
      - cfgms-test
    profiles:
      - ha

  steward-tenant3:
    container_name: steward-tenant3
    build:
      context: .
      dockerfile: cmd/steward/Dockerfile
      args:
        STEWARD_CONTROLLER_URL: "https://controller-standalone:9080"
    environment:
      CFGMS_TENANT_ID: "tenant3"  # Story 12.5: Tenant isolation
      CFGMS_REGISTRATION_TOKEN: "${REG_TOKEN_TENANT3}"
      CFGMS_LOG_LEVEL: "debug"
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
    command: ["sh", "-c", "./steward --log-level debug --log-provider file --regtoken $$CFGMS_REGISTRATION_TOKEN --tenant-id tenant3"]
    volumes:
      - steward_tenant3_data:/app/data
      - ./test/module-execution:/test-workspace:rw
    depends_on:
      controller-standalone:
        condition: service_healthy
    networks:
      - cfgms-test
    profiles:
      - ha

  # ============================================================================
  # TRUE Standalone Steward - Tier 1: QUICK_START.md Option A Testing
  # ============================================================================
  # Runs steward in true standalone mode with local config file
  # NO controller connection - validates QUICK_START.md Option A workflow
  # Tests: File/directory creation, module execution, idempotency
  # Start with: docker compose --profile standalone up
  # ============================================================================

  steward-true-standalone:
    container_name: steward-true-standalone
    build:
      context: .
      dockerfile: cmd/steward/Dockerfile
    environment:
      # Disable file logging to avoid permission issues in standalone mode
      CFGMS_LOG_PROVIDER: "file"
      CFGMS_LOG_DIR: "/tmp/cfgms"
    # Run as root to avoid permission issues, create log dir first
    user: root
    command: ["sh", "-c", "mkdir -p /tmp/cfgms && ./steward -config /app/config/standalone.yaml -log-level info -log-provider file"]
    volumes:
      - ./test/integration/standalone/config:/app/config:ro  # Mount config directory
      - steward_true_standalone_data:/app/data
      - steward_true_standalone_workspace:/test-workspace:rw  # Workspace for file/directory tests
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep steward | grep -v grep"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cfgms-test
    profiles:
      - standalone  # NEW profile for Tier 1 testing

  # OpenBao dev-mode instance for secrets provider integration tests.
  # Uses host port 8201 to avoid collision with any local Vault/OpenBao on 8200.
  # Start with: docker compose --profile openbao -f docker-compose.test.yml up -d openbao-test
  openbao-test:
    image: openbao/openbao:latest
    container_name: cfgms-openbao-test
    command: server -dev -dev-root-token-id=root
    environment:
      BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8201:8200"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cfgms-test
    profiles:
      - openbao

