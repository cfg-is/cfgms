# Staticcheck Configuration for CFGMS
# Focus on important issues, exclude style warnings for development velocity
#
# Rule Categories:
# - SA: Static analysis (bugs, correctness issues)
# - S: Stylistic issues (excluded for development velocity)
# - ST: Standard library misuse
# - U: Unused code detection (limited to reduce noise)
# - QF: Quick fixes suggestions

# Enable important static analysis checks
checks = [
  # Critical correctness issues
  "SA1*",   # Various static analysis checks
  "SA2*",   # Goroutine and channel issues  
  "SA3*",   # Testing and benchmarking issues
  "SA4*",   # Code correctness issues
  "SA5*",   # Integer overflow and type conversion
  "SA6*",   # Synchronization issues
  "SA9*",   # Suspicious constructs
  
  # Standard library misuse (critical for security)
  "ST1000", # Incorrect usage of regexp.MustCompile
  "ST1001", # Incorrect usage of strconv functions
  "ST1003", # Poorly chosen identifier names (API-facing only)
  "ST1005", # Incorrectly formatted error strings
  "ST1006", # Poorly chosen receiver names
  "ST1008", # Functions should use consistent naming
  "ST1011", # Variable names in range loops
  "ST1012", # Poor error checking patterns
  "ST1013", # HTTP status code constants
  "ST1015", # Using time.Tick in long-running programs
  "ST1016", # Use consistent method receiver names
  "ST1017", # Don't use Yoda conditions
  "ST1018", # Avoid string literal duplication
  "ST1019", # Import statement grouping
  "ST1020", # Comment should be of the form "Package foo ..."
  "ST1021", # Comment should be of the form "Foo ..."
  "ST1022", # Comment should be of the form "Foo ..."
  
  # Limited unused code detection (reduce noise)
  "U1000",  # Unused functions (critical for deadcode)
  
  # Quick fixes for common issues
  "QF1001", # Apply De Morgan's law
  "QF1002", # Convert untagged switch to tagged switch
  "QF1003", # Convert if/else-if chain to tagged switch
  "QF1004", # Use strings.ReplaceAll instead of strings.Replace with n == -1
  "QF1005", # Expand call to math.Pow with integer exponent
  "QF1006", # Lift if+break into loop condition
  "QF1007", # Merge conditional assignment into variable declaration
  "QF1008", # Omit embedded fields from selector expression
  "QF1009", # Use time.Time.Equal instead of == operator
  "QF1010", # Convert slice of bytes to string when printing
  "QF1011", # Omit redundant type from variable declaration
  "QF1012", # Use fmt.Fprintf(x, ...) instead of x.Write(fmt.Sprintf(...))
]

# Exclude style-focused checks to maintain development velocity
# These are important for final code review but not for rapid development
exclude_checks = [
  # Stylistic issues (exclude for development velocity)
  "S1*",    # Code simplification suggestions
  
  # Unused code detection (too noisy during development)
  "U1001",  # Unused constants
  "U1002",  # Unused variables  
  "U1003",  # Unused global variables
  "U1004",  # Unused fields
  "U1005",  # Unused parameters
  "U1006",  # Unused receivers
  
  # Comment-related style checks (exclude during development)
  "ST1000", # Package comment format
  "ST1001", # Dot imports
  "ST1002", # Poorly chosen variable names (too subjective)
  "ST1003", # API naming (handled by code review)
  "ST1004", # Spelling mistakes in comments
]

# Performance optimizations
[performance]
# Enable go module cache for faster analysis
use_go_cache = true

# Enable analysis result caching (speeds up subsequent runs)
cache_results = true

# Limit memory usage for large codebases (in MB)
max_memory = 512

# Enable concurrent analysis where possible
max_concurrency = 4

# File patterns to exclude from analysis (performance optimization)
[exclude]
# Exclude test files during rapid development (can be enabled for full scans)
paths = [
  "**/*_test.go",
  "**/testdata/**/*",
  "**/vendor/**/*",
  "**/examples/**/*",
  "**/test/integration/**/*",
  "**/test/e2e/**/*",
  # Development certificates (known false positives)
  "**/features/controller/certs/**/*"
]

# Exclude generated files and third-party code
generated_files = true
vendor_dirs = true

# Focus on application code quality
[focus]
# Prioritize core application packages
important_packages = [
  "./features/**/*",
  "./cmd/**/*", 
  "./pkg/**/*",
  "./api/**/*"
]

# Issue severity mapping for Claude Code integration
[severity]
SA = "high"      # Static analysis issues are high priority
ST = "medium"    # Standard library misuse is medium priority  
U = "low"        # Unused code is low priority during development
QF = "info"      # Quick fixes are informational

# Output formatting for automated tooling
[output]
format = "json"
include_location = true
include_suggestions = true
max_issues_per_file = 10  # Prevent overwhelming output